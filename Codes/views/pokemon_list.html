<!DOCTYPE html>
<html>
<head>
    <title>Pokémon List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .search-suggestions {
            position: relative;
            display: inline-block;
        }
        
        .search-suggestions input {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            width: 280px;
            font-size: 14px;
        }
        
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .suggestions-box div {
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #eee;
        }
        
        .suggestions-box div:hover {
            background: #ffcb05;
        }
        
        .control-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .dark-mode-toggle, .language-select {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover, .language-select:hover {
            transform: scale(1.05);
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .type-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
        }
        
        body.dark-mode .type-filters {
            background: rgba(0,0,0,0.8);
        }
        
        .type-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: white;
        }
        
        .type-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .type-btn.active {
            box-shadow: 0 0 0 3px white, 0 0 0 5px #2a75bb;
        }
        
        .type-btn.all {
            background: #2a75bb;
        }
        
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .pokemon-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        body.dark-mode .pokemon-card {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .pokemon-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .pokemon-card img {
            width: 120px;
            height: 120px;
        }
        
        .pokemon-card h3 {
            color: #2a75bb;
            margin: 10px 0;
            font-size: 18px;
        }
        
        body.dark-mode .pokemon-card h3 {
            color: #ffcb05;
        }
        
        .pokemon-number {
            color: #666;
            font-size: 12px;
        }
        
        body.dark-mode .pokemon-number {
            color: #aaa;
        }
        
        .type-badges {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }
        
        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
            color: #ccc;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .favorite-btn.favorited {
            color: gold;
            text-shadow: 0 0 3px orange;
        }
        
        .special-badge {
            display: inline-block;
            background: #ff9800;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .gen-badge {
            display: inline-block;
            background: #78c850;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: white;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats-info {
            text-align: center;
            margin: 10px 0;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            .type-filters {
                max-height: 200px;
                overflow-y: auto;
            }
            .top-bar {
                flex-direction: column;
            }
            .search-suggestions input {
                width: 100%;
            }
            .control-buttons {
                order: -1;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌟 Pokémon List 🌟</h1>
    
    <div class="top-bar">
        <a href="start.html" class="back-link">← Home</a>
        
        <div class="search-suggestions">
            <input type="text" id="searchInput" placeholder="🔍 Search Pokémon (e.g., 'mega', 'gmax', 'ash')...">
            <div id="suggestions" class="suggestions-box"></div>
        </div>
        
        <div class="control-buttons">
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">🇬🇧 English</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="es">🇪🇸 Español</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
        </div>
        
        <div class="nav-buttons">
            <a href="team.html" class="nav-btn">⭐ My Team</a>
            <a href="compare.html" class="nav-btn">📊 Compare</a>
            <a href="type_chart.html" class="nav-btn">⚔️ Type Chart</a>
        </div>
    </div>
    
    <div class="type-filters" id="typeFilters">
        <button class="type-btn all active" data-type="all">All</button>
    </div>
    
    <div class="stats-info" id="statsInfo"></div>
    
    <div id="pokemonGrid" class="pokemon-grid">
        <div class="loading"><div class="loader"></div>Loading Pokémon...</div>
    </div>
</div>

<script>
    let allPokemon = [];
    let currentType = 'all';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let currentLang = localStorage.getItem('language') || 'en';
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    const types = ["normal", "fire", "water", "electric", "grass", "ice", "fighting", "poison", "ground", "flying", "psychic", "bug", "rock", "ghost", "dragon", "dark", "steel", "fairy"];
    
    // Vollständige Liste aller speziellen Formen (Mega, Gmax, Ash, Regional)
    const knownSpecialForms = [
        // Ash-Greninja
        { id: 10003, name: "Ash-Greninja", searchNames: ["greninja-ash", "ash-greninja", "ash greninja", "greninja"], displayName: "Ash-Greninja" },
        // Mega Charizard
        { id: 10034, name: "Mega Charizard X", searchNames: ["charizard-mega-x", "mega-charizard-x", "mega charizard x", "charizard"], displayName: "Mega Charizard X" },
        { id: 10035, name: "Mega Charizard Y", searchNames: ["charizard-mega-y", "mega-charizard-y", "mega charizard y", "charizard"], displayName: "Mega Charizard Y" },
        // Mega Mewtwo
        { id: 10036, name: "Mega Mewtwo X", searchNames: ["mewtwo-mega-x", "mega-mewtwo-x", "mega mewtwo x", "mewtwo"], displayName: "Mega Mewtwo X" },
        { id: 10037, name: "Mega Mewtwo Y", searchNames: ["mewtwo-mega-y", "mega-mewtwo-y", "mega mewtwo y", "mewtwo"], displayName: "Mega Mewtwo Y" },
        // Weitere Megas
        { id: 10038, name: "Mega Gengar", searchNames: ["gengar-mega", "mega-gengar", "mega gengar", "gengar"], displayName: "Mega Gengar" },
        { id: 10039, name: "Mega Gyarados", searchNames: ["gyarados-mega", "mega-gyarados", "mega gyarados", "gyarados"], displayName: "Mega Gyarados" },
        { id: 10040, name: "Mega Aerodactyl", searchNames: ["aerodactyl-mega", "mega-aerodactyl", "mega aerodactyl", "aerodactyl"], displayName: "Mega Aerodactyl" },
        { id: 10041, name: "Mega Ampharos", searchNames: ["ampharos-mega", "mega-ampharos", "mega ampharos", "ampharos"], displayName: "Mega Ampharos" },
        { id: 10042, name: "Mega Steelix", searchNames: ["steelix-mega", "mega-steelix", "mega steelix", "steelix"], displayName: "Mega Steelix" },
        { id: 10043, name: "Mega Scizor", searchNames: ["scizor-mega", "mega-scizor", "mega scizor", "scizor"], displayName: "Mega Scizor" },
        { id: 10044, name: "Mega Heracross", searchNames: ["heracross-mega", "mega-heracross", "mega heracross", "heracross"], displayName: "Mega Heracross" },
        { id: 10045, name: "Mega Houndoom", searchNames: ["houndoom-mega", "mega-houndoom", "mega houndoom", "houndoom"], displayName: "Mega Houndoom" },
        { id: 10046, name: "Mega Tyranitar", searchNames: ["tyranitar-mega", "mega-tyranitar", "mega tyranitar", "tyranitar"], displayName: "Mega Tyranitar" },
        { id: 10047, name: "Mega Blaziken", searchNames: ["blaziken-mega", "mega-blaziken", "mega blaziken", "blaziken"], displayName: "Mega Blaziken" },
        { id: 10048, name: "Mega Gardevoir", searchNames: ["gardevoir-mega", "mega-gardevoir", "mega gardevoir", "gardevoir"], displayName: "Mega Gardevoir" },
        { id: 10049, name: "Mega Sableye", searchNames: ["sableye-mega", "mega-sableye", "mega sableye", "sableye"], displayName: "Mega Sableye" },
        { id: 10050, name: "Mega Mawile", searchNames: ["mawile-mega", "mega-mawile", "mega mawile", "mawile"], displayName: "Mega Mawile" },
        { id: 10051, name: "Mega Aggron", searchNames: ["aggron-mega", "mega-aggron", "mega aggron", "aggron"], displayName: "Mega Aggron" },
        { id: 10052, name: "Mega Medicham", searchNames: ["medicham-mega", "mega-medicham", "mega medicham", "medicham"], displayName: "Mega Medicham" },
        { id: 10053, name: "Mega Manectric", searchNames: ["manectric-mega", "mega-manectric", "mega manectric", "manectric"], displayName: "Mega Manectric" },
        { id: 10054, name: "Mega Sharpedo", searchNames: ["sharpedo-mega", "mega-sharpedo", "mega sharpedo", "sharpedo"], displayName: "Mega Sharpedo" },
        { id: 10055, name: "Mega Camerupt", searchNames: ["camerupt-mega", "mega-camerupt", "mega camerupt", "camerupt"], displayName: "Mega Camerupt" },
        { id: 10056, name: "Mega Altaria", searchNames: ["altaria-mega", "mega-altaria", "mega altaria", "altaria"], displayName: "Mega Altaria" },
        { id: 10057, name: "Mega Banette", searchNames: ["banette-mega", "mega-banette", "mega banette", "banette"], displayName: "Mega Banette" },
        { id: 10058, name: "Mega Absol", searchNames: ["absol-mega", "mega-absol", "mega absol", "absol"], displayName: "Mega Absol" },
        { id: 10059, name: "Mega Glalie", searchNames: ["glalie-mega", "mega-glalie", "mega glalie", "glalie"], displayName: "Mega Glalie" },
        { id: 10060, name: "Mega Salamence", searchNames: ["salamence-mega", "mega-salamence", "mega salamence", "salamence"], displayName: "Mega Salamence" },
        { id: 10061, name: "Mega Metagross", searchNames: ["metagross-mega", "mega-metagross", "mega metagross", "metagross"], displayName: "Mega Metagross" },
        { id: 10062, name: "Mega Latias", searchNames: ["latias-mega", "mega-latias", "mega latias", "latias"], displayName: "Mega Latias" },
        { id: 10063, name: "Mega Latios", searchNames: ["latios-mega", "mega-latios", "mega latios", "latios"], displayName: "Mega Latios" },
        { id: 10064, name: "Mega Rayquaza", searchNames: ["rayquaza-mega", "mega-rayquaza", "mega rayquaza", "rayquaza"], displayName: "Mega Rayquaza" },
        { id: 10065, name: "Mega Lopunny", searchNames: ["lopunny-mega", "mega-lopunny", "mega lopunny", "lopunny"], displayName: "Mega Lopunny" },
        { id: 10066, name: "Mega Garchomp", searchNames: ["garchomp-mega", "mega-garchomp", "mega garchomp", "garchomp"], displayName: "Mega Garchomp" },
        { id: 10067, name: "Mega Lucario", searchNames: ["lucario-mega", "mega-lucario", "mega lucario", "lucario"], displayName: "Mega Lucario" },
        { id: 10068, name: "Mega Abomasnow", searchNames: ["abomasnow-mega", "mega-abomasnow", "mega abomasnow", "abomasnow"], displayName: "Mega Abomasnow" },
        { id: 10069, name: "Mega Gallade", searchNames: ["gallade-mega", "mega-gallade", "mega gallade", "gallade"], displayName: "Mega Gallade" },
        { id: 10070, name: "Mega Audino", searchNames: ["audino-mega", "mega-audino", "mega audino", "audino"], displayName: "Mega Audino" },
        { id: 10071, name: "Mega Diancie", searchNames: ["diancie-mega", "mega-diancie", "mega diancie", "diancie"], displayName: "Mega Diancie" },
        // Gigantamax Formen
        { id: 10072, name: "Gigantamax Charizard", searchNames: ["charizard-gmax", "gmax-charizard", "gigantamax charizard", "charizard"], displayName: "Gigantamax Charizard" },
        { id: 10073, name: "Gigantamax Pikachu", searchNames: ["pikachu-gmax", "gmax-pikachu", "gigantamax pikachu", "pikachu"], displayName: "Gigantamax Pikachu" },
        { id: 10074, name: "Gigantamax Eevee", searchNames: ["eevee-gmax", "gmax-eevee", "gigantamax eevee", "eevee"], displayName: "Gigantamax Eevee" },
        { id: 10075, name: "Gigantamax Meowth", searchNames: ["meowth-gmax", "gmax-meowth", "gigantamax meowth", "meowth"], displayName: "Gigantamax Meowth" },
        { id: 10076, name: "Gigantamax Gengar", searchNames: ["gengar-gmax", "gmax-gengar", "gigantamax gengar", "gengar"], displayName: "Gigantamax Gengar" }
    ];
    
    const filterContainer = document.getElementById('typeFilters');
    types.forEach(type => {
        const btn = document.createElement('button');
        btn.className = `type-btn`;
        btn.style.background = typeColors[type];
        btn.setAttribute('data-type', type);
        btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
        btn.onclick = () => filterByType(type);
        filterContainer.appendChild(btn);
    });
    
    async function loadPokemon() {
        const container = document.getElementById('pokemonGrid');
        container.innerHTML = '<div class="loading"><div class="loader"></div>Loading Pokémon...</div>';
        
        try {
            const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
            const data = await response.json();
            
            allPokemon = [];
            
            // Normale Pokémon Gen 1-6
            for (let item of data.results) {
                const id = parseInt(item.url.split('/').slice(-2)[0]);
                if (id <= 721) {
                    let gen = 1;
                    if (id <= 151) gen = 1;
                    else if (id <= 251) gen = 2;
                    else if (id <= 386) gen = 3;
                    else if (id <= 493) gen = 4;
                    else if (id <= 649) gen = 5;
                    else gen = 6;
                    
                    try {
                        const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                        const pokeData = await pokeRes.json();
                        const pokemonTypes = pokeData.types.map(t => t.type.name);
                        
                        allPokemon.push({
                            id: id,
                            name: item.name.charAt(0).toUpperCase() + item.name.slice(1),
                            searchName: item.name,
                            gen: gen,
                            types: pokemonTypes,
                            isSpecial: false
                        });
                    } catch(e) {
                        allPokemon.push({
                            id: id,
                            name: item.name.charAt(0).toUpperCase() + item.name.slice(1),
                            searchName: item.name,
                            gen: gen,
                            types: [],
                            isSpecial: false
                        });
                    }
                }
            }
            
            // Spezielle Formen (für Gen 7+ und Megas)
            for (let special of knownSpecialForms) {
                try {
                    const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${special.id}`);
                    if (pokeRes.ok) {
                        const pokeData = await pokeRes.json();
                        const pokemonTypes = pokeData.types.map(t => t.type.name);
                        
                        allPokemon.push({
                            id: special.id,
                            name: special.displayName,
                            searchNames: special.searchNames,
                            gen: 7,
                            types: pokemonTypes,
                            isSpecial: true
                        });
                    } else {
                        // Fallback wenn API nicht verfügbar
                        allPokemon.push({
                            id: special.id,
                            name: special.displayName,
                            searchNames: special.searchNames,
                            gen: 7,
                            types: [],
                            isSpecial: true
                        });
                    }
                } catch(e) {
                    console.log(`Could not load special form ${special.id}:`, e);
                    allPokemon.push({
                        id: special.id,
                        name: special.displayName,
                        searchNames: special.searchNames,
                        gen: 7,
                        types: [],
                        isSpecial: true
                    });
                }
            }
            
            allPokemon.sort((a, b) => a.id - b.id);
            updateStats();
            renderPokemon();
            
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = '<div class="loading">❌ Error loading Pokémon. Please refresh.</div>';
        }
    }
    
    function updateStats() {
        const specialCount = allPokemon.filter(p => p.isSpecial).length;
        document.getElementById('statsInfo').innerHTML = `📊 ${allPokemon.length} Pokémon (${specialCount} special forms) | ⭐ ${favorites.length}/6 in team`;
    }
    
    function renderPokemon() {
        const container = document.getElementById('pokemonGrid');
        let filtered = [...allPokemon];
        
        // Nach Typ filtern
        if (currentType !== 'all') {
            filtered = filtered.filter(p => p.types && p.types.includes(currentType));
        }
        
        // Nach Suchbegriff filtern
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        if (searchQuery.length >= 2) {
            filtered = filtered.filter(p => {
                if (p.name.toLowerCase().includes(searchQuery)) return true;
                if (p.searchName && p.searchName.toLowerCase().includes(searchQuery)) return true;
                if (p.searchNames) {
                    return p.searchNames.some(sn => sn.toLowerCase().includes(searchQuery));
                }
                return false;
            });
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">⚠️ No Pokémon found</div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => `
            <div class="pokemon-card" onclick="location.href='pokemon_detail.html?id=${p.id}'">
                <button class="favorite-btn ${favorites.includes(p.id) ? 'favorited' : ''}" 
                        onclick="event.stopPropagation(); toggleFavorite(${p.id})">
                    ${favorites.includes(p.id) ? '★' : '☆'}
                </button>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" 
                     onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
                <h3>${p.name}</h3>
                <div class="pokemon-number">#${String(p.id).padStart(p.isSpecial ? 5 : 3, '0')}</div>
                <div class="type-badges">
                    ${p.types ? p.types.map(t => `<span class="type-badge" style="background: ${typeColors[t]}">${t.toUpperCase()}</span>`).join('') : ''}
                </div>
                ${p.isSpecial ? '<div class="special-badge">⭐ Special Form</div>' : `<div class="gen-badge">Gen ${p.gen}</div>`}
            </div>
        `).join('');
    }
    
    function filterByType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-type') === type) {
                btn.classList.add('active');
            }
        });
        renderPokemon();
    }
    
    function toggleFavorite(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(f => f !== id);
        } else if (favorites.length < 6) {
            favorites.push(id);
        } else {
            alert('You can only have 6 Pokémon in your team!');
            return;
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateStats();
        renderPokemon();
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    document.getElementById('languageSelect').value = currentLang;
    
    // Live-Suche mit sofortiger Anzeige
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderPokemon();
        
        const query = e.target.value.toLowerCase();
        if (query.length < 2) {
            document.getElementById('suggestions').style.display = 'none';
            return;
        }
        
        const matches = allPokemon.filter(p => {
            if (p.name.toLowerCase().includes(query)) return true;
            if (p.searchName && p.searchName.toLowerCase().includes(query)) return true;
            if (p.searchNames) {
                return p.searchNames.some(sn => sn.toLowerCase().includes(query));
            }
            return false;
        }).slice(0, 10);
        
        const suggestions = document.getElementById('suggestions');
        if (matches.length > 0) {
            suggestions.style.display = 'block';
            suggestions.innerHTML = matches.map(p => 
                `<div onclick="location.href='pokemon_detail.html?id=${p.id}'">${p.name} (#${String(p.id).padStart(p.isSpecial ? 5 : 3, '0')})${p.isSpecial ? ' ⭐ Special' : ''}</div>`
            ).join('');
        } else {
            suggestions.style.display = 'none';
        }
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-suggestions')) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });
    
    loadPokemon();
</script>
</body>
</html>
