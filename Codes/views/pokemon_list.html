<!DOCTYPE html>
<html>
<head>
    <title>Pokémon List</title>
    <style>
        /* ... deine bestehenden Styles ... */
    </style>
</head>
<body>
<div class="container">
    <h1>🌟 Pokémon List 🌟</h1>
    
    <div class="top-bar">
        <a href="start.html" class="back-link">← Home</a>
        <div class="search-suggestions">
            <input type="text" id="searchInput" placeholder="🔍 Search Pokémon... (mega, gmax, primal, ash)">
            <div id="suggestions" class="suggestions-box"></div>
        </div>
        <div class="control-buttons">
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">🇬🇧 English</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="es">🇪🇸 Español</option>
            </select>
        </div>
        <div class="nav-buttons">
            <a href="team.html" class="nav-btn">⭐ My Team</a>
            <a href="compare.html" class="nav-btn">📊 Compare</a>
            <a href="type_chart.html" class="nav-btn">⚔️ Type Chart</a>
        </div>
    </div>
    
    <div class="type-filters" id="typeFilters">
        <button class="type-btn all active" data-type="all">All</button>
    </div>
    
    <div class="stats-info" id="statsInfo"></div>
    <div id="pokemonGrid" class="pokemon-grid"><div class="loader"></div></div>
</div>

<script>
    let allPokemon = [];
    let currentType = 'all';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let currentLang = localStorage.getItem('language') || 'en';
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    const types = ["normal", "fire", "water", "electric", "grass", "ice", "fighting", "poison", "ground", "flying", "psychic", "bug", "rock", "ghost", "dragon", "dark", "steel", "fairy"];
    
    // Vollständige Liste aller speziellen Formen (wie in der Compare-Seite)
    // Diese IDs werden von der PokeAPI unterstützt
    const specialFormsList = [
        // Mega Evolutions
        { id: 10034, name: "Mega Charizard X", searchTerms: ["mega", "charizard", "mega-charizard-x"] },
        { id: 10035, name: "Mega Charizard Y", searchTerms: ["mega", "charizard", "mega-charizard-y"] },
        { id: 10036, name: "Mega Mewtwo X", searchTerms: ["mega", "mewtwo", "mega-mewtwo-x"] },
        { id: 10037, name: "Mega Mewtwo Y", searchTerms: ["mega", "mewtwo", "mega-mewtwo-y"] },
        { id: 10038, name: "Mega Gengar", searchTerms: ["mega", "gengar", "mega-gengar"] },
        { id: 10039, name: "Mega Gyarados", searchTerms: ["mega", "gyarados", "mega-gyarados"] },
        { id: 10040, name: "Mega Aerodactyl", searchTerms: ["mega", "aerodactyl", "mega-aerodactyl"] },
        { id: 10041, name: "Mega Ampharos", searchTerms: ["mega", "ampharos", "mega-ampharos"] },
        { id: 10042, name: "Mega Steelix", searchTerms: ["mega", "steelix", "mega-steelix"] },
        { id: 10043, name: "Mega Scizor", searchTerms: ["mega", "scizor", "mega-scizor"] },
        { id: 10044, name: "Mega Heracross", searchTerms: ["mega", "heracross", "mega-heracross"] },
        { id: 10045, name: "Mega Houndoom", searchTerms: ["mega", "houndoom", "mega-houndoom"] },
        { id: 10046, name: "Mega Tyranitar", searchTerms: ["mega", "tyranitar", "mega-tyranitar"] },
        { id: 10047, name: "Mega Blaziken", searchTerms: ["mega", "blaziken", "mega-blaziken"] },
        { id: 10048, name: "Mega Gardevoir", searchTerms: ["mega", "gardevoir", "mega-gardevoir"] },
        { id: 10049, name: "Mega Sableye", searchTerms: ["mega", "sableye", "mega-sableye"] },
        { id: 10050, name: "Mega Mawile", searchTerms: ["mega", "mawile", "mega-mawile"] },
        { id: 10051, name: "Mega Aggron", searchTerms: ["mega", "aggron", "mega-aggron"] },
        { id: 10052, name: "Mega Medicham", searchTerms: ["mega", "medicham", "mega-medicham"] },
        { id: 10053, name: "Mega Manectric", searchTerms: ["mega", "manectric", "mega-manectric"] },
        { id: 10054, name: "Mega Sharpedo", searchTerms: ["mega", "sharpedo", "mega-sharpedo"] },
        { id: 10055, name: "Mega Camerupt", searchTerms: ["mega", "camerupt", "mega-camerupt"] },
        { id: 10056, name: "Mega Altaria", searchTerms: ["mega", "altaria", "mega-altaria"] },
        { id: 10057, name: "Mega Banette", searchTerms: ["mega", "banette", "mega-banette"] },
        { id: 10058, name: "Mega Absol", searchTerms: ["mega", "absol", "mega-absol"] },
        { id: 10059, name: "Mega Glalie", searchTerms: ["mega", "glalie", "mega-glalie"] },
        { id: 10060, name: "Mega Salamence", searchTerms: ["mega", "salamence", "mega-salamence"] },
        { id: 10061, name: "Mega Metagross", searchTerms: ["mega", "metagross", "mega-metagross"] },
        { id: 10062, name: "Mega Latias", searchTerms: ["mega", "latias", "mega-latias"] },
        { id: 10063, name: "Mega Latios", searchTerms: ["mega", "latios", "mega-latios"] },
        { id: 10064, name: "Mega Rayquaza", searchTerms: ["mega", "rayquaza", "mega-rayquaza"] },
        { id: 10065, name: "Mega Lopunny", searchTerms: ["mega", "lopunny", "mega-lopunny"] },
        { id: 10066, name: "Mega Garchomp", searchTerms: ["mega", "garchomp", "mega-garchomp"] },
        { id: 10067, name: "Mega Lucario", searchTerms: ["mega", "lucario", "mega-lucario"] },
        { id: 10068, name: "Mega Abomasnow", searchTerms: ["mega", "abomasnow", "mega-abomasnow"] },
        { id: 10069, name: "Mega Gallade", searchTerms: ["mega", "gallade", "mega-gallade"] },
        { id: 10070, name: "Mega Audino", searchTerms: ["mega", "audino", "mega-audino"] },
        { id: 10071, name: "Mega Diancie", searchTerms: ["mega", "diancie", "mega-diancie"] },
        // Primal Forms
        { id: 10080, name: "Primal Kyogre", searchTerms: ["primal", "kyogre", "primal-kyogre"] },
        { id: 10081, name: "Primal Groudon", searchTerms: ["primal", "groudon", "primal-groudon"] },
        // Ash-Greninja
        { id: 10003, name: "Ash-Greninja", searchTerms: ["ash", "greninja", "ash-greninja"] },
        // Gigantamax Forms
        { id: 10072, name: "Gigantamax Charizard", searchTerms: ["gmax", "gigantamax", "charizard"] },
        { id: 10073, name: "Gigantamax Pikachu", searchTerms: ["gmax", "gigantamax", "pikachu"] },
        { id: 10074, name: "Gigantamax Eevee", searchTerms: ["gmax", "gigantamax", "eevee"] },
        { id: 10075, name: "Gigantamax Meowth", searchTerms: ["gmax", "gigantamax", "meowth"] },
        { id: 10076, name: "Gigantamax Gengar", searchTerms: ["gmax", "gigantamax", "gengar"] },
        { id: 10077, name: "Gigantamax Lapras", searchTerms: ["gmax", "gigantamax", "lapras"] },
        { id: 10078, name: "Gigantamax Snorlax", searchTerms: ["gmax", "gigantamax", "snorlax"] },
        { id: 10079, name: "Gigantamax Machamp", searchTerms: ["gmax", "gigantamax", "machamp"] },
        // Regional Forms (Alola, Galar, Hisui)
        { id: 10100, name: "Alolan Raichu", searchTerms: ["alola", "raichu", "alolan-raichu"] },
        { id: 10101, name: "Alolan Marowak", searchTerms: ["alola", "marowak", "alolan-marowak"] },
        { id: 10102, name: "Alolan Exeggutor", searchTerms: ["alola", "exeggutor", "alolan-exeggutor"] },
        { id: 10103, name: "Galarian Ponyta", searchTerms: ["galar", "ponyta", "galarian-ponyta"] },
        { id: 10104, name: "Galarian Rapidash", searchTerms: ["galar", "rapidash", "galarian-rapidash"] },
        { id: 10105, name: "Galarian Slowbro", searchTerms: ["galar", "slowbro", "galarian-slowbro"] },
        { id: 10106, name: "Hisuian Growlithe", searchTerms: ["hisui", "growlithe", "hisuian-growlithe"] },
        { id: 10107, name: "Hisuian Arcanine", searchTerms: ["hisui", "arcanine", "hisuian-arcanine"] }
    ];
    
    const filterContainer = document.getElementById('typeFilters');
    types.forEach(type => {
        const btn = document.createElement('button');
        btn.className = `type-btn`;
        btn.style.background = typeColors[type];
        btn.setAttribute('data-type', type);
        btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
        btn.onclick = () => filterByType(type);
        filterContainer.appendChild(btn);
    });
    
    async function loadPokemon() {
        const container = document.getElementById('pokemonGrid');
        container.innerHTML = '<div class="loading"><div class="loader"></div>Loading Pokémon...</div>';
        
        try {
            const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
            const data = await response.json();
            
            allPokemon = [];
            
            // Normale Pokémon (Gen 1-9)
            for (let item of data.results) {
                const id = parseInt(item.url.split('/').slice(-2)[0]);
                let gen = 1;
                if (id <= 151) gen = 1;
                else if (id <= 251) gen = 2;
                else if (id <= 386) gen = 3;
                else if (id <= 493) gen = 4;
                else if (id <= 649) gen = 5;
                else if (id <= 721) gen = 6;
                else if (id <= 809) gen = 7;
                else if (id <= 905) gen = 8;
                else gen = 9;
                
                try {
                    const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                    const pokeData = await pokeRes.json();
                    allPokemon.push({
                        id: id,
                        name: item.name.charAt(0).toUpperCase() + item.name.slice(1),
                        gen: gen,
                        types: pokeData.types.map(t => t.type.name),
                        isSpecial: false
                    });
                } catch(e) {
                    allPokemon.push({
                        id: id,
                        name: item.name.charAt(0).toUpperCase() + item.name.slice(1),
                        gen: gen,
                        types: [],
                        isSpecial: false
                    });
                }
            }
            
            // Spezielle Formen hinzufügen (wie in Compare-Seite)
            for (let special of specialFormsList) {
                try {
                    const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${special.id}`);
                    if (pokeRes.ok) {
                        const pokeData = await pokeRes.json();
                        allPokemon.push({
                            id: special.id,
                            name: special.name,
                            gen: 7,
                            types: pokeData.types.map(t => t.type.name),
                            isSpecial: true,
                            searchTerms: special.searchTerms
                        });
                    } else {
                        allPokemon.push({
                            id: special.id,
                            name: special.name,
                            gen: 7,
                            types: [],
                            isSpecial: true,
                            searchTerms: special.searchTerms
                        });
                    }
                } catch(e) {
                    allPokemon.push({
                        id: special.id,
                        name: special.name,
                        gen: 7,
                        types: [],
                        isSpecial: true,
                        searchTerms: special.searchTerms
                    });
                }
            }
            
            allPokemon.sort((a, b) => a.id - b.id);
            updateStats();
            renderPokemon();
        } catch (error) {
            container.innerHTML = '<div class="loading">❌ Error loading Pokémon. Please refresh.</div>';
        }
    }
    
    function updateStats() {
        const specialCount = allPokemon.filter(p => p.isSpecial).length;
        document.getElementById('statsInfo').innerHTML = `📊 ${allPokemon.length} Pokémon (${specialCount} special forms) | ⭐ ${favorites.length}/6 in team`;
    }
    
    function renderPokemon() {
        const container = document.getElementById('pokemonGrid');
        let filtered = [...allPokemon];
        
        if (currentType !== 'all') {
            filtered = filtered.filter(p => p.types && p.types.includes(currentType));
        }
        
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        if (searchQuery.length >= 2) {
            filtered = filtered.filter(p => {
                if (p.name.toLowerCase().includes(searchQuery)) return true;
                if (p.searchTerms) return p.searchTerms.some(term => term.toLowerCase().includes(searchQuery));
                return false;
            });
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">⚠️ No Pokémon found</div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => `
            <div class="pokemon-card" onclick="location.href='pokemon_detail.html?id=${p.id}'">
                <button class="favorite-btn ${favorites.includes(p.id) ? 'favorited' : ''}" onclick="event.stopPropagation(); toggleFavorite(${p.id})">${favorites.includes(p.id) ? '★' : '☆'}</button>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
                <h3>${p.name}</h3>
                <div class="pokemon-number">#${String(p.id).padStart(p.isSpecial ? 5 : 3, '0')}</div>
                <div class="type-badges">${p.types ? p.types.map(t => `<span class="type-badge" style="background: ${typeColors[t]}">${t.toUpperCase()}</span>`).join('') : ''}</div>
                ${p.isSpecial ? '<div class="special-badge">⭐ Special Form</div>' : `<div class="gen-badge">Gen ${p.gen}</div>`}
            </div>
        `).join('');
    }
    
    function filterByType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-type') === type) btn.classList.add('active');
        });
        renderPokemon();
    }
    
    function toggleFavorite(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(f => f !== id);
        } else if (favorites.length < 6) {
            favorites.push(id);
        } else { alert('You can only have 6 Pokémon in your team!'); return; }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateStats();
        renderPokemon();
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        btn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
    }
    
    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    document.getElementById('languageSelect').value = currentLang;
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderPokemon();
        const query = e.target.value.toLowerCase();
        if (query.length < 2) { document.getElementById('suggestions').style.display = 'none'; return; }
        const matches = allPokemon.filter(p => {
            if (p.name.toLowerCase().includes(query)) return true;
            if (p.searchTerms) return p.searchTerms.some(term => term.toLowerCase().includes(query));
            return false;
        }).slice(0, 10);
        const suggestions = document.getElementById('suggestions');
        if (matches.length > 0) {
            suggestions.style.display = 'block';
            suggestions.innerHTML = matches.map(p => `<div onclick="location.href='pokemon_detail.html?id=${p.id}'">${p.name} (#${String(p.id).padStart(p.isSpecial ? 5 : 3, '0')})${p.isSpecial ? ' ⭐ Special' : ''}</div>`).join('');
        } else { suggestions.style.display = 'none'; }
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-suggestions')) document.getElementById('suggestions').style.display = 'none';
    });
    
    loadPokemon();
</script>
</body>
</html>
