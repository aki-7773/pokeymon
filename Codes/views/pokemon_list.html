<!DOCTYPE html>
<html>
<head>
    <title>Pokémon List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .search-suggestions {
            position: relative;
            display: inline-block;
        }
        
        .search-suggestions input {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            width: 280px;
            font-size: 14px;
        }
        
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .suggestions-box div {
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #eee;
        }
        
        .suggestions-box div:hover {
            background: #ffcb05;
        }
        
        .dark-mode-toggle {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover {
            transform: scale(1.05);
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .special-forms-warning {
            background: rgba(255,152,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            color: white;
            font-size: 14px;
        }
        
        body.dark-mode .special-forms-warning {
            background: rgba(255,152,0,0.3);
        }
        
        .type-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
        }
        
        body.dark-mode .type-filters {
            background: rgba(0,0,0,0.8);
        }
        
        .type-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: white;
        }
        
        .type-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .type-btn.active {
            box-shadow: 0 0 0 3px white, 0 0 0 5px #2a75bb;
        }
        
        .type-btn.all {
            background: #2a75bb;
        }
        
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .pokemon-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        body.dark-mode .pokemon-card {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .pokemon-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .pokemon-card img {
            width: 120px;
            height: 120px;
        }
        
        .pokemon-card h3 {
            color: #2a75bb;
            margin: 10px 0;
            font-size: 18px;
        }
        
        body.dark-mode .pokemon-card h3 {
            color: #ffcb05;
        }
        
        .pokemon-number {
            color: #666;
            font-size: 12px;
        }
        
        body.dark-mode .pokemon-number {
            color: #aaa;
        }
        
        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
            color: #ccc;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .favorite-btn.favorited {
            color: gold;
            text-shadow: 0 0 3px orange;
        }
        
        .api-badge {
            display: inline-block;
            background: #2a75bb;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .special-badge {
            display: inline-block;
            background: #ff9800;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .gen-badge {
            display: inline-block;
            background: #78c850;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: white;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats-info {
            text-align: center;
            margin: 10px 0;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            .type-filters {
                max-height: 200px;
                overflow-y: auto;
            }
            .top-bar {
                flex-direction: column;
            }
            .search-suggestions input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="control-buttons">
    <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
    <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>
<div class="container">
    <h1>🌟 Pokémon List 🌟</h1>
    
    <div class="top-bar">
        <a href="/" class="back-link">← Home</a>
        
        <div class="search-suggestions">
            <input type="text" id="searchInput" placeholder="🔍 Search Pokémon... (e.g., 'mega', 'gmax', 'ash')">
            <div id="suggestions" class="suggestions-box"></div>
        </div>
        
        <div class="nav-buttons">
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <a href="/team" class="nav-btn">⭐ My Team</a>
            <a href="/compare" class="nav-btn">📊 Compare</a>
            <a href="/type-chart" class="nav-btn">⚔️ Type Chart</a>
            <a href="/gallery" class="nav-btn">🎨 Gallery</a>
            <a href="/top-10" class="nav-btn">🏆 Top 10</a>
        </div>
    </div>
    
    <div class="special-forms-warning">
        💡 <strong>Tip:</strong> Special forms (Mega, Gmax, Regional, Ash) can be accessed by searching! Try "mega-charizard", "gmax-gengar", or "greninja-ash"
    </div>
    
    <div class="type-filters" id="typeFilters">
        <button class="type-btn all active" data-type="all">All</button>
    </div>
    
    <div class="stats-info" id="statsInfo"></div>
    
    <div id="pokemonGrid" class="pokemon-grid">
        <div class="loading"><div class="loader"></div>Loading Pokémon...</div>
    </div>
</div>

<script>
    let allPokemon = [];
    let specialForms = [];
    let currentType = 'all';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    const types = ["normal", "fire", "water", "electric", "grass", "ice", "fighting", "poison", "ground", "flying", "psychic", "bug", "rock", "ghost", "dragon", "dark", "steel", "fairy"];
    
    const filterContainer = document.getElementById('typeFilters');
    types.forEach(type => {
        const btn = document.createElement('button');
        btn.className = `type-btn`;
        btn.style.background = typeColors[type];
        btn.setAttribute('data-type', type);
        btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
        btn.onclick = () => filterByType(type);
        filterContainer.appendChild(btn);
    });
    
    // Bekannte spezielle Formen für schnellen Zugriff
    const knownSpecialForms = [
        { id: 10034, name: "Mega Charizard X", searchName: "charizard-mega-x", displayName: "Mega Charizard X" },
        { id: 10035, name: "Mega Charizard Y", searchName: "charizard-mega-y", displayName: "Mega Charizard Y" },
        { id: 10036, name: "Mega Mewtwo X", searchName: "mewtwo-mega-x", displayName: "Mega Mewtwo X" },
        { id: 10037, name: "Mega Mewtwo Y", searchName: "mewtwo-mega-y", displayName: "Mega Mewtwo Y" },
        { id: 10038, name: "Mega Gengar", searchName: "gengar-mega", displayName: "Mega Gengar" },
        { id: 10003, name: "Ash-Greninja", searchName: "greninja-ash", displayName: "Ash-Greninja" },
        { id: 10039, name: "Mega Gyarados", searchName: "gyarados-mega", displayName: "Mega Gyarados" },
        { id: 10040, name: "Mega Aerodactyl", searchName: "aerodactyl-mega", displayName: "Mega Aerodactyl" },
        { id: 10041, name: "Mega Ampharos", searchName: "ampharos-mega", displayName: "Mega Ampharos" },
        { id: 10042, name: "Mega Steelix", searchName: "steelix-mega", displayName: "Mega Steelix" },
        { id: 10043, name: "Mega Scizor", searchName: "scizor-mega", displayName: "Mega Scizor" },
        { id: 10044, name: "Mega Heracross", searchName: "heracross-mega", displayName: "Mega Heracross" },
        { id: 10045, name: "Mega Houndoom", searchName: "houndoom-mega", displayName: "Mega Houndoom" },
        { id: 10046, name: "Mega Tyranitar", searchName: "tyranitar-mega", displayName: "Mega Tyranitar" },
        { id: 10047, name: "Mega Blaziken", searchName: "blaziken-mega", displayName: "Mega Blaziken" },
        { id: 10048, name: "Mega Gardevoir", searchName: "gardevoir-mega", displayName: "Mega Gardevoir" },
        { id: 10049, name: "Mega Sableye", searchName: "sableye-mega", displayName: "Mega Sableye" },
        { id: 10050, name: "Mega Mawile", searchName: "mawile-mega", displayName: "Mega Mawile" },
        { id: 10051, name: "Mega Aggron", searchName: "aggron-mega", displayName: "Mega Aggron" },
        { id: 10052, name: "Mega Medicham", searchName: "medicham-mega", displayName: "Mega Medicham" },
        { id: 10053, name: "Mega Manectric", searchName: "manectric-mega", displayName: "Mega Manectric" },
        { id: 10054, name: "Mega Sharpedo", searchName: "sharpedo-mega", displayName: "Mega Sharpedo" },
        { id: 10055, name: "Mega Camerupt", searchName: "camerupt-mega", displayName: "Mega Camerupt" },
        { id: 10056, name: "Mega Altaria", searchName: "altaria-mega", displayName: "Mega Altaria" },
        { id: 10057, name: "Mega Banette", searchName: "banette-mega", displayName: "Mega Banette" },
        { id: 10058, name: "Mega Absol", searchName: "absol-mega", displayName: "Mega Absol" },
        { id: 10059, name: "Mega Glalie", searchName: "glalie-mega", displayName: "Mega Glalie" },
        { id: 10060, name: "Mega Salamence", searchName: "salamence-mega", displayName: "Mega Salamence" },
        { id: 10061, name: "Mega Metagross", searchName: "metagross-mega", displayName: "Mega Metagross" },
        { id: 10062, name: "Mega Latias", searchName: "latias-mega", displayName: "Mega Latias" },
        { id: 10063, name: "Mega Latios", searchName: "latios-mega", displayName: "Mega Latios" },
        { id: 10064, name: "Mega Rayquaza", searchName: "rayquaza-mega", displayName: "Mega Rayquaza" },
        { id: 10065, name: "Mega Lopunny", searchName: "lopunny-mega", displayName: "Mega Lopunny" },
        { id: 10066, name: "Mega Garchomp", searchName: "garchomp-mega", displayName: "Mega Garchomp" },
        { id: 10067, name: "Mega Lucario", searchName: "lucario-mega", displayName: "Mega Lucario" },
        { id: 10068, name: "Mega Abomasnow", searchName: "abomasnow-mega", displayName: "Mega Abomasnow" },
        { id: 10069, name: "Mega Gallade", searchName: "gallade-mega", displayName: "Mega Gallade" },
        { id: 10070, name: "Mega Audino", searchName: "audino-mega", displayName: "Mega Audino" },
        { id: 10071, name: "Mega Diancie", searchName: "diancie-mega", displayName: "Mega Diancie" }
    ];
    
    async function loadPokemon() {
        const container = document.getElementById('pokemonGrid');
        container.innerHTML = '<div class="loading"><div class="loader"></div>Loading Pokémon...</div>';
        
        try {
            const response = await fetch('/pokemon-data');
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            allPokemon = data.pokemon || [];
            
            specialForms = knownSpecialForms.map(form => ({
                id: form.id,
                name: form.name,
                searchName: form.searchName,
                displayName: form.displayName,
                isApi: true,
                isSpecial: true
            }));
            
            updateStats();
            renderPokemon();
            
        } catch (error) {
            console.error('Error loading Pokémon:', error);
            container.innerHTML = '<div class="loading">❌ Error loading Pokémon. Please refresh the page.</div>';
        }
    }
    
    function updateStats() {
        const total = allPokemon.length + specialForms.length;
        document.getElementById('statsInfo').innerHTML = `📊 Showing ${total} Pokémon | ⭐ ${favorites.length}/6 in your team | Special forms: ${specialForms.length}`;
    }
    
    function renderPokemon() {
        const container = document.getElementById('pokemonGrid');
        let filtered = [...allPokemon, ...specialForms];
        
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        if (searchQuery.length >= 2) {
            filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(searchQuery) || 
                (p.searchName && p.searchName.toLowerCase().includes(searchQuery))
            );
        }
        
        if (currentType !== 'all') {
            // Typ-Filter funktioniert nur für normale Pokémon (keine speziellen Formen)
            filtered = filtered.filter(p => !p.isSpecial);
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">⚠️ No Pokémon match your search</div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => {
            const isSpecial = p.isSpecial || (p.id > 10000);
            const searchId = p.searchName ? p.id : p.id;
            const displayName = p.name;
            
            return `
                <div class="pokemon-card" onclick="location.href='/pokemon/${searchId}'">
                    <button class="favorite-btn ${favorites.includes(searchId) ? 'favorited' : ''}" 
                            onclick="event.stopPropagation(); toggleFavorite(${searchId})">
                        ${favorites.includes(searchId) ? '★' : '☆'}
                    </button>
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${searchId}.png" 
                         alt="${displayName}"
                         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
                    <h3>${displayName}</h3>
                    <div class="pokemon-number">#${String(p.id).padStart(5, '0')}</div>
                    ${isSpecial ? '<div class="special-badge">⭐ Special Form</div>' : (p.isApi ? '<div class="api-badge">Gen 7+</div>' : '<div class="gen-badge">Gen 1-6</div>')}
                </div>
            `;
        }).join('');
    }
    
    function filterByType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-type') === type) {
                btn.classList.add('active');
            }
        });
        renderPokemon();
    }
    
    function toggleFavorite(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(f => f !== id);
        } else if (favorites.length < 6) {
            favorites.push(id);
        } else {
            alert('You can only have 6 Pokémon in your team!');
            return;
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateStats();
        renderPokemon();
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    
    // Suchvorschläge
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        if (query.length < 2) {
            document.getElementById('suggestions').style.display = 'none';
            renderPokemon();
            return;
        }
        
        const matches = [...allPokemon, ...specialForms].filter(p => 
            p.name.toLowerCase().includes(query) || 
            (p.searchName && p.searchName.toLowerCase().includes(query))
        ).slice(0, 10);
        
        const suggestions = document.getElementById('suggestions');
        if (matches.length > 0) {
            suggestions.style.display = 'block';
            suggestions.innerHTML = matches.map(p => {
                const searchId = p.searchName ? p.id : p.id;
                const specialTag = p.isSpecial ? ' ⭐ Special Form' : (p.isApi ? ' 🌐 Gen 7+' : ' 📗 Gen 1-6');
                return `<div onclick="location.href='/pokemon/${searchId}'">${p.name} (#${String(p.id).padStart(5, '0')})${specialTag}</div>`;
            }).join('');
        } else {
            suggestions.style.display = 'none';
            renderPokemon();
        }
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-suggestions')) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });
    
    loadPokemon();
</script>
<script src="/static/lang.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.getElementById('darkModeBtn');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    function changeLanguage(lang) {
        setLanguage(lang);
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeBtn').innerHTML = '☀️ Light Mode';
    }
    
    document.getElementById('languageSelect').value = localStorage.getItem('language') || 'en';
</script>
</body>
</html>
