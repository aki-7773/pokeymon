<!DOCTYPE html>
<html>
<head>
    <title>Pokémon List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .search-suggestions {
            position: relative;
            display: inline-block;
        }
        
        .search-suggestions input {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            width: 280px;
            font-size: 14px;
        }
        
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .suggestions-box div {
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #eee;
        }
        
        .suggestions-box div:hover {
            background: #ffcb05;
        }
        
        .dark-mode-toggle {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover {
            transform: scale(1.05);
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .type-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
        }
        
        body.dark-mode .type-filters {
            background: rgba(0,0,0,0.8);
        }
        
        .type-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: white;
        }
        
        .type-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .type-btn.active {
            box-shadow: 0 0 0 3px white, 0 0 0 5px #2a75bb;
        }
        
        .type-btn.all {
            background: #2a75bb;
        }
        
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .pokemon-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        body.dark-mode .pokemon-card {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .pokemon-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .pokemon-card img {
            width: 120px;
            height: 120px;
        }
        
        .pokemon-card h3 {
            color: #2a75bb;
            margin: 10px 0;
            font-size: 18px;
        }
        
        body.dark-mode .pokemon-card h3 {
            color: #ffcb05;
        }
        
        .pokemon-number {
            color: #666;
            font-size: 12px;
        }
        
        body.dark-mode .pokemon-number {
            color: #aaa;
        }
        
        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
            color: #ccc;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .favorite-btn.favorited {
            color: gold;
            text-shadow: 0 0 3px orange;
        }
        
        .gen-badge {
            display: inline-block;
            background: #78c850;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: white;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats-info {
            text-align: center;
            margin: 10px 0;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            .type-filters {
                max-height: 200px;
                overflow-y: auto;
            }
            .top-bar {
                flex-direction: column;
            }
            .search-suggestions input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌟 Pokémon List 🌟</h1>
    
    <div class="top-bar">
        <a href="/" class="back-link">← Home</a>
        
        <div class="search-suggestions">
            <input type="text" id="searchInput" placeholder="🔍 Search Pokémon...">
            <div id="suggestions" class="suggestions-box"></div>
        </div>
        
        <div class="nav-buttons">
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <a href="/team" class="nav-btn">⭐ My Team</a>
            <a href="/compare" class="nav-btn">📊 Compare</a>
            <a href="/type-chart" class="nav-btn">⚔️ Type Chart</a>
        </div>
    </div>
    
    <div class="type-filters" id="typeFilters">
        <button class="type-btn all active" data-type="all">All</button>
    </div>
    
    <div class="stats-info" id="statsInfo"></div>
    
    <div id="pokemonGrid" class="pokemon-grid">
        <div class="loading"><div class="loader"></div>Loading Pokémon...</div>
    </div>
</div>

<script>
    let allPokemon = [];
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    const types = ["normal", "fire", "water", "electric", "grass", "ice", "fighting", "poison", "ground", "flying", "psychic", "bug", "rock", "ghost", "dragon", "dark", "steel", "fairy"];
    
    const filterContainer = document.getElementById('typeFilters');
    types.forEach(type => {
        const btn = document.createElement('button');
        btn.className = `type-btn`;
        btn.style.background = typeColors[type];
        btn.setAttribute('data-type', type);
        btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
        btn.onclick = () => filterByType(type);
        filterContainer.appendChild(btn);
    });
    
    async function loadPokemon() {
        const container = document.getElementById('pokemonGrid');
        container.innerHTML = '<div class="loading"><div class="loader"></div>Loading Pokémon...</div>';
        
        try {
            const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
            const data = await response.json();
            
            allPokemon = [];
            for (let item of data.results) {
                const id = parseInt(item.url.split('/').slice(-2)[0]);
                if (id <= 721) {
                    let gen = 1;
                    if (id <= 151) gen = 1;
                    else if (id <= 251) gen = 2;
                    else if (id <= 386) gen = 3;
                    else if (id <= 493) gen = 4;
                    else if (id <= 649) gen = 5;
                    else gen = 6;
                    
                    allPokemon.push({
                        id: id,
                        name: item.name.charAt(0).toUpperCase() + item.name.slice(1),
                        gen: gen
                    });
                }
            }
            allPokemon.sort((a, b) => a.id - b.id);
            
            updateStats();
            renderPokemon();
            
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = '<div class="loading">❌ Error loading Pokémon. Please refresh.</div>';
        }
    }
    
    function updateStats() {
        document.getElementById('statsInfo').innerHTML = `📊 ${allPokemon.length} Pokémon | ⭐ ${favorites.length}/6 in team`;
    }
    
    function renderPokemon() {
        const container = document.getElementById('pokemonGrid');
        let filtered = [...allPokemon];
        
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        if (searchQuery.length >= 2) {
            filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">⚠️ No Pokémon found</div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => `
            <div class="pokemon-card" onclick="location.href='/pokemon/${p.id}'">
                <button class="favorite-btn ${favorites.includes(p.id) ? 'favorited' : ''}" 
                        onclick="event.stopPropagation(); toggleFavorite(${p.id})">
                    ${favorites.includes(p.id) ? '★' : '☆'}
                </button>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" 
                     onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'">
                <h3>${p.name}</h3>
                <div class="pokemon-number">#${String(p.id).padStart(3, '0')}</div>
                <div class="gen-badge">Gen ${p.gen}</div>
            </div>
        `).join('');
    }
    
    function filterByType(type) {
        renderPokemon();
    }
    
    function toggleFavorite(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(f => f !== id);
        } else if (favorites.length < 6) {
            favorites.push(id);
        } else {
            alert('You can only have 6 Pokémon in your team!');
            return;
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateStats();
        renderPokemon();
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        if (query.length < 2) {
            document.getElementById('suggestions').style.display = 'none';
            renderPokemon();
            return;
        }
        
        const matches = allPokemon.filter(p => p.name.toLowerCase().includes(query)).slice(0, 10);
        const suggestions = document.getElementById('suggestions');
        if (matches.length > 0) {
            suggestions.style.display = 'block';
            suggestions.innerHTML = matches.map(p => 
                `<div onclick="location.href='/pokemon/${p.id}'">${p.name} (#${String(p.id).padStart(3, '0')})</div>`
            ).join('');
        } else {
            suggestions.style.display = 'none';
            renderPokemon();
        }
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-suggestions')) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });
    
    loadPokemon();
</script>
</body>
</html>
