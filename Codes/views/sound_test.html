<!DOCTYPE html>
<html>
<head>
    <title>Sound Test</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: #ffcb05;
            color: #2a75bb;
            font-weight: bold;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🎵 Pokémon Sound Test 🎵</h1>
    <button onclick="playClick()">🔊 Click Sound</button>
    <button onclick="playCry(25)">🔊 Pikachu Cry</button>
    <button onclick="playCry(1)">🔊 Bulbasaur Cry</button>
    <button onclick="playCry(4)">🔊 Charmander Cry</button>
    <button onclick="playCry(7)">🔊 Squirtle Cry</button>
    
    <script>
        function playClick() {
            const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBzdHJpbmcgbm90IGZvdW5k');
            audio.volume = 0.2;
            audio.play().catch(e => console.log('Click sound not available'));
        }
        
        async function playCry(id) {
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const data = await response.json();
                const cryUrl = data.cries?.latest || data.cries?.legacy;
                if (cryUrl) {
                    const audio = new Audio(cryUrl);
                    audio.volume = 0.5;
                    audio.play();
                    alert(`Playing cry for Pokémon #${id}!`);
                } else {
                    alert('No cry available for this Pokémon');
                }
            } catch (error) {
                alert('Error playing cry: ' + error);
            }
        }
    </script>
</body>
</html>
