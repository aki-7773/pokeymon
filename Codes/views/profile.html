<!DOCTYPE html>
<html>
<head>
    <title>My Profile - Pokémon Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .profile-card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
        }
        
        body.dark-mode .profile-card {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ffcb05, #f5b700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
        }
        
        .profile-name {
            font-size: 28px;
            color: #2a75bb;
            margin-bottom: 10px;
        }
        
        body.dark-mode .profile-name {
            color: #ffcb05;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: rgba(0,0,0,0.1);
            padding: 15px;
            border-radius: 15px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #2a75bb;
        }
        
        body.dark-mode .stat-number {
            color: #ffcb05;
        }
        
        .teams-container {
            margin: 30px 0;
        }
        
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .team-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        body.dark-mode .team-card {
            background: rgba(0,0,0,0.8);
        }
        
        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .team-name {
            font-size: 18px;
            font-weight: bold;
            color: #2a75bb;
            margin-bottom: 10px;
        }
        
        body.dark-mode .team-name {
            color: #ffcb05;
        }
        
        .team-pokemon {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .team-pokemon img {
            width: 50px;
            height: 50px;
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .achievement {
            background: rgba(0,0,0,0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .achievement.locked { opacity: 0.5; }
        .achievement.unlocked { background: rgba(76, 175, 80, 0.2); border: 1px solid #4caf50; }
        .achievement-icon { font-size: 32px; margin-bottom: 10px; }
        .achievement-name { font-weight: bold; margin-bottom: 5px; }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .edit-btn {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .teams-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<div class="container">
    <h1>👤 My Profile 👤</h1>
    
    <div class="nav-buttons">
        <a href="start.html" class="nav-btn">← Home</a>
        <a href="pokemon_list.html" class="nav-btn">📋 All Pokémon</a>
        <a href="team.html" class="nav-btn">⭐ My Team</a>
        <a href="advanced_compare.html" class="nav-btn">📊 Advanced Compare</a>
    </div>
    
    <div class="profile-card">
        <div class="avatar">🎮</div>
        <div class="profile-name" id="profileName">Pokémon Trainer</div>
        <button class="edit-btn" onclick="editName()">✏️ Edit Name</button>
        
        <div class="profile-stats">
            <div class="stat-box"><div class="stat-number" id="totalPokemon">0</div><div>Pokémon Collected</div></div>
            <div class="stat-box"><div class="stat-number" id="totalTeams">0</div><div>Teams Created</div></div>
            <div class="stat-box"><div class="stat-number" id="achievementsUnlocked">0</div><div>Achievements</div></div>
            <div class="stat-box"><div class="stat-number" id="totalFavorites">0</div><div>Favorites</div></div>
        </div>
    </div>
    
    <div class="profile-card">
        <h2>🏆 Achievements 🏆</h2>
        <div class="achievements-grid" id="achievementsGrid"></div>
    </div>
    
    <div class="profile-card">
        <h2>📁 My Teams 📁</h2>
        <button class="edit-btn" onclick="createNewTeam()">➕ Create New Team</button>
        <div class="teams-grid" id="teamsGrid"></div>
    </div>
</div>

<script>
    let profile = {
        name: localStorage.getItem('profileName') || 'Pokémon Trainer',
        teams: JSON.parse(localStorage.getItem('profileTeams') || '[]'),
        achievements: JSON.parse(localStorage.getItem('achievements') || '[]')
    };
    
    const allAchievements = [
        { id: 'first_pokemon', name: 'First Pokémon', description: 'Add your first Pokémon to favorites', icon: '🎯', condition: (data) => data.favorites >= 1 },
        { id: 'team_builder', name: 'Team Builder', description: 'Create a full team of 6 Pokémon', icon: '⭐', condition: (data) => data.favorites >= 6 },
        { id: 'collector', name: 'Collector', description: 'Have 10 favorite Pokémon', icon: '📦', condition: (data) => data.favorites >= 10 },
        { id: 'master', name: 'Master Trainer', description: 'Have 20 favorite Pokémon', icon: '🏆', condition: (data) => data.favorites >= 20 },
        { id: 'team_creator', name: 'Team Creator', description: 'Create your first team', icon: '📁', condition: (data) => data.teams >= 1 },
        { id: 'strategist', name: 'Strategist', description: 'Create 3 different teams', icon: '🎯', condition: (data) => data.teams >= 3 }
    ];
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    
    function updateProfile() {
        document.getElementById('profileName').textContent = profile.name;
        
        const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        const totalFavorites = favorites.length;
        
        const data = {
            favorites: totalFavorites,
            teams: profile.teams.length
        };
        
        document.getElementById('totalPokemon').textContent = totalFavorites;
        document.getElementById('totalTeams').textContent = profile.teams.length;
        document.getElementById('totalFavorites').textContent = totalFavorites;
        
        let unlockedCount = 0;
        for (let ach of allAchievements) {
            if (!profile.achievements.includes(ach.id) && ach.condition(data)) {
                profile.achievements.push(ach.id);
            }
            if (profile.achievements.includes(ach.id)) unlockedCount++;
        }
        
        document.getElementById('achievementsUnlocked').textContent = `${unlockedCount}/${allAchievements.length}`;
        localStorage.setItem('achievements', JSON.stringify(profile.achievements));
        
        renderAchievements();
        renderTeams();
    }
    
    function renderAchievements() {
        const container = document.getElementById('achievementsGrid');
        container.innerHTML = allAchievements.map(ach => {
            const isUnlocked = profile.achievements.includes(ach.id);
            return `<div class="achievement ${isUnlocked ? 'unlocked' : 'locked'}">
                        <div class="achievement-icon">${ach.icon}</div>
                        <div class="achievement-name">${ach.name}</div>
                        <div style="font-size: 11px;">${ach.description}</div>
                        ${isUnlocked ? '<span style="color: #4caf50;">✓ Unlocked</span>' : '<span style="color: #999;">🔒 Locked</span>'}
                    </div>`;
        }).join('');
    }
    
    function renderTeams() {
        const container = document.getElementById('teamsGrid');
        if (profile.teams.length === 0) {
            container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No teams yet. Click "Create New Team" to start!</p>';
            return;
        }
        
        container.innerHTML = profile.teams.map((team, index) => `
            <div class="team-card" onclick="viewTeam(${index})">
                <div class="team-name">${team.name}</div>
                <div class="team-pokemon">
                    ${team.pokemon.map(id => `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png'">`).join('')}
                    ${Array(6 - team.pokemon.length).fill('<div style="width:50px; height:50px; background:rgba(0,0,0,0.1); border-radius:10px; display:flex; align-items:center; justify-content:center;">?</div>').join('')}
                </div>
                <button class="edit-btn" onclick="event.stopPropagation(); deleteTeam(${index})" style="background:#f44336; margin-top:10px;">Delete</button>
            </div>
        `).join('');
    }
    
    function createNewTeam() {
        const teamName = prompt('Enter team name:', `Team ${profile.teams.length + 1}`);
        if (!teamName) return;
        
        profile.teams.push({ name: teamName, pokemon: [] });
        localStorage.setItem('profileTeams', JSON.stringify(profile.teams));
        updateProfile();
    }
    
    function viewTeam(index) {
        const team = profile.teams[index];
        alert(`Team: ${team.name}\nPokémon: ${team.pokemon.length}/6`);
    }
    
    function deleteTeam(index) {
        if (confirm('Delete this team?')) {
            profile.teams.splice(index, 1);
            localStorage.setItem('profileTeams', JSON.stringify(profile.teams));
            updateProfile();
        }
    }
    
    function editName() {
        const newName = prompt('Enter your trainer name:', profile.name);
        if (newName && newName.trim()) {
            profile.name = newName.trim();
            localStorage.setItem('profileName', profile.name);
            updateProfile();
        }
    }
    
    updateProfile();
</script>
</body>
</html>
