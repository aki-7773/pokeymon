<!DOCTYPE html>
<html>
<head>
    <title>Print Pokémon Card</title>
    <style>
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print {
                display: none;
            }
            .pokemon-card {
                box-shadow: none;
                border: 2px solid #ddd;
                page-break-inside: avoid;
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .no-print {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .no-print button {
            padding: 10px 20px;
            margin: 0 10px;
            background: #2a75bb;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .no-print button:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .pokemon-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            border-bottom: 3px solid #ffcb05;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #2a75bb;
            font-size: 32px;
        }
        
        .pokemon-img {
            text-align: center;
            margin: 20px 0;
        }
        
        .pokemon-img img {
            width: 200px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        
        .info-item {
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .info-label {
            font-weight: bold;
            color: #2a75bb;
        }
        
        .type-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            color: white;
            margin: 3px;
        }
        
        .stats-table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
        }
        
        .stats-table td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        
        .stats-table td:first-child {
            font-weight: bold;
        }
        
        .dex-entry {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-style: italic;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #999;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            color: #f44336;
        }
    </style>
</head>
<body>
<div class="control-buttons">
    <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
    <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>
<div class="container">
    <div class="no-print">
        <button onclick="window.print()">🖨️ Print / Save as PDF</button>
        <button onclick="window.close()">✖️ Close</button>
    </div>
    
    <div class="pokemon-card" id="pokemonCard">
        <div class="loader"></div>
        <p style="text-align: center;">Loading Pokémon data...</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pokemonId = urlParams.get('id');
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    // Mapping für spezielle Formen zur Basis-Form für Pokédex Eintrag
    const specialFormToBase = {
        10003: 'greninja', 10034: 'charizard', 10035: 'charizard',
        10036: 'mewtwo', 10037: 'mewtwo', 10038: 'gengar'
    };
    
    async function getPokedexEntry(id, pokemonName) {
        let speciesId = id;
        
        // Für spezielle Formen die Basis-ID verwenden
        if (id > 10000 && specialFormToBase[id]) {
            try {
                const baseResponse = await fetch(`https://pokeapi.co/api/v2/pokemon/${specialFormToBase[id]}`);
                if (baseResponse.ok) {
                    const baseData = await baseResponse.json();
                    speciesId = baseData.id;
                }
            } catch(e) {}
        }
        
        try {
            const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${speciesId}`);
            if (speciesRes.ok) {
                const species = await speciesRes.json();
                for (let entry of species.flavor_text_entries) {
                    if (entry.language.name === "en") {
                        return entry.flavor_text.replace(/\n/g, ' ').replace(/\f/g, ' ');
                    }
                }
            }
        } catch(e) {
            console.log('Could not load dex entry:', e);
        }
        
        // Fallback: Versuche mit dem Basis-Namen
        if (id > 10000) {
            let baseName = pokemonName.toLowerCase().replace('-mega', '').replace('-gmax', '').replace('-ash', '');
            if (baseName.includes('charizard')) baseName = 'charizard';
            if (baseName.includes('mewtwo')) baseName = 'mewtwo';
            if (baseName.includes('greninja')) baseName = 'greninja';
            if (baseName.includes('gengar')) baseName = 'gengar';
            
            try {
                const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${baseName}`);
                if (speciesRes.ok) {
                    const species = await speciesRes.json();
                    for (let entry of species.flavor_text_entries) {
                        if (entry.language.name === "en") {
                            return entry.flavor_text.replace(/\n/g, ' ').replace(/\f/g, ' ');
                        }
                    }
                }
            } catch(e) {}
        }
        
        return "No Pokédex entry available for this Pokémon.";
    }
    
    async function loadPokemonForPrint() {
        const container = document.getElementById('pokemonCard');
        
        if (!pokemonId) {
            container.innerHTML = '<div class="error-message">❌ No Pokémon selected</div>';
            return;
        }
        
        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonId}`);
            if (!response.ok) throw new Error('Pokémon not found');
            const pokemon = await response.json();
            
            const pokemonName = pokemon.name.charAt(0).toUpperCase() + pokemon.name.slice(1);
            const isSpecial = pokemonId > 10000;
            
            // Pokédex Eintrag laden
            const dexEntry = await getPokedexEntry(parseInt(pokemonId), pokemon.name);
            
            container.innerHTML = `
                <div class="header">
                    <h1>${pokemonName}</h1>
                    <p>#${String(pokemon.id).padStart(5, '0')}${isSpecial ? ' ⭐ Special Form' : ''}</p>
                </div>
                
                <div class="pokemon-img">
                    <img src="${pokemon.sprites.other['official-artwork'].front_default || pokemon.sprites.front_default}" 
                         alt="${pokemonName}"
                         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png'">
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">📏 Height</div>
                        <div>${pokemon.height / 10} m</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">⚖️ Weight</div>
                        <div>${pokemon.weight / 10} kg</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🎮 Base Exp</div>
                        <div>${pokemon.base_experience}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🌈 Types</div>
                        <div>${pokemon.types.map(t => `<span class="type-badge" style="background: ${typeColors[t.type.name]}">${t.type.name.toUpperCase()}</span>`).join('')}</div>
                    </div>
                </div>
                
                <h3 style="margin: 20px 0 10px;">📊 Base Stats</h3>
                <table class="stats-table">
                    <tr><td>❤️ HP</td><td>${pokemon.stats[0].base_stat}</td></tr>
                    <tr><td>⚔️ Attack</td><td>${pokemon.stats[1].base_stat}</td></tr>
                    <tr><td>🛡️ Defense</td><td>${pokemon.stats[2].base_stat}</td></tr>
                    <tr><td>🔮 Sp. Attack</td><td>${pokemon.stats[3].base_stat}</td></tr>
                    <tr><td>✨ Sp. Defense</td><td>${pokemon.stats[4].base_stat}</td></tr>
                    <tr><td>⚡ Speed</td><td>${pokemon.stats[5].base_stat}</td></tr>
                    <tr style="border-top: 2px solid #ddd;"><td><strong>⭐ Total</strong></td><td><strong>${pokemon.stats.reduce((sum, s) => sum + s.base_stat, 0)}</strong></td></tr>
                </table>
                
                <div class="dex-entry">
                    <strong>📖 Pokédex Entry</strong><br>
                    "${dexEntry}"
                </div>
                
                <div class="footer">
                    Pokémon © 1995-2024 Nintendo, Game Freak, and Creatures Inc.<br>
                    Data from PokeAPI • Printed on ${new Date().toLocaleDateString()}
                </div>
            `;
            
        } catch (error) {
            console.error('Error loading Pokémon:', error);
            container.innerHTML = `<div class="error-message">❌ Error loading Pokémon #${pokemonId}<br><small>Please check if this Pokémon exists in the API</small></div>`;
        }
    }
    
    loadPokemonForPrint();
</script>
<script src="/static/lang.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.getElementById('darkModeBtn');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    function changeLanguage(lang) {
        setLanguage(lang);
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeBtn').innerHTML = '☀️ Light Mode';
    }
    
    document.getElementById('languageSelect').value = localStorage.getItem('language') || 'en';
</script>
</body>
</html>
