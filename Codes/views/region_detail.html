<!DOCTYPE html>
<html>
<head>
    <title>Region - Pokémon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .region-header {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        body.dark-mode .region-header {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .region-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .region-header h1 {
            color: #2a75bb;
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        body.dark-mode .region-header h1 {
            color: #ffcb05;
        }
        
        .region-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-card {
            background: linear-gradient(135deg, #ffcb05, #f5b700);
            padding: 15px;
            border-radius: 15px;
        }
        
        body.dark-mode .info-card {
            background: linear-gradient(135deg, #2a75bb, #1e5a9e);
        }
        
        .info-card h3 {
            color: #2a75bb;
            margin-bottom: 8px;
        }
        
        body.dark-mode .info-card h3 {
            color: #ffcb05;
        }
        
        .info-card p {
            color: #333;
        }
        
        body.dark-mode .info-card p {
            color: white;
        }
        
        .description {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            font-style: italic;
            line-height: 1.6;
        }
        
        body.dark-mode .description {
            background: rgba(0,0,0,0.7);
            color: #ddd;
        }
        
        .pokemon-section {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 25px;
            margin: 30px 0;
        }
        
        body.dark-mode .pokemon-section {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .pokemon-section h2 {
            color: #2a75bb;
            margin-bottom: 20px;
            text-align: center;
        }
        
        body.dark-mode .pokemon-section h2 {
            color: #ffcb05;
        }
        
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .pokemon-mini {
            background: linear-gradient(135deg, #ffcb05, #f5b700);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        body.dark-mode .pokemon-mini {
            background: linear-gradient(135deg, #2a75bb, #1e5a9e);
        }
        
        .pokemon-mini:hover {
            transform: scale(1.05);
        }
        
        .pokemon-mini a {
            text-decoration: none;
            color: #2a75bb;
            font-weight: bold;
        }
        
        body.dark-mode .pokemon-mini a {
            color: #ffcb05;
        }
        
        .back-links {
            text-align: center;
            margin: 20px 0;
        }
        
        .back-links a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        
        .back-links a:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
<button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<div class="container" id="container">
    <div class="loader" style="text-align: center; padding: 50px;">Loading...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const regionId = parseInt(urlParams.get('id'));
    
    const regionsData = {
        1: { name: "Kanto", generation: 1, starter: "Bulbasaur, Charmander, Squirtle", games: "Red/Blue/Yellow", 
            description: "The Kanto region is the original Pokémon region, based on the Kanto region of Japan. It's known for its diverse landscapes including forests, caves, and the iconic Indigo Plateau.",
            pokemon_count: 151, legendary: "Articuno, Zapdos, Moltres, Mewtwo", icon: "🏔️" },
        2: { name: "Johto", generation: 2, starter: "Chikorita, Cyndaquil, Totodile", games: "Gold/Silver/Crystal", 
            description: "Johto is located west of Kanto and is known for its traditional Japanese aesthetic, ancient towers, and the famous Lake of Rage.",
            pokemon_count: 100, legendary: "Raikou, Entei, Suicune, Ho-Oh, Lugia", icon: "🏯" },
        3: { name: "Hoenn", generation: 3, starter: "Treecko, Torchic, Mudkip", games: "Ruby/Sapphire/Emerald", 
            description: "Hoenn is a tropical region with a rich variety of landscapes including volcanoes, rainforests, and deep oceans.",
            pokemon_count: 135, legendary: "Groudon, Kyogre, Rayquaza", icon: "🌋" },
        4: { name: "Sinnoh", generation: 4, starter: "Turtwig, Chimchar, Piplup", games: "Diamond/Pearl/Platinum", 
            description: "Sinnoh is a northern region known for its harsh climates, ancient ruins, and the legendary Pokémon that control time and space.",
            pokemon_count: 107, legendary: "Dialga, Palkia, Giratina", icon: "❄️" },
        5: { name: "Unova", generation: 5, starter: "Snivy, Tepig, Oshawott", games: "Black/White", 
            description: "Unova is based on New York City and features a unique blend of urban and natural environments.",
            pokemon_count: 156, legendary: "Reshiram, Zekrom, Kyurem", icon: "🏙️" },
        6: { name: "Kalos", generation: 6, starter: "Chespin, Fennekin, Froakie", games: "X/Y", 
            description: "Kalos is based on France and introduced the Fairy type and Mega Evolution mechanics.",
            pokemon_count: 72, legendary: "Xerneas, Yveltal, Zygarde", icon: "🗼" },
        7: { name: "Alola", generation: 7, starter: "Rowlet, Litten, Popplio", games: "Sun/Moon", 
            description: "Alola is a tropical region based on Hawaii, featuring unique island trials.",
            pokemon_count: 88, legendary: "Solgaleo, Lunala, Necrozma", icon: "🌴" },
        8: { name: "Galar", generation: 8, starter: "Grookey, Scorbunny, Sobble", games: "Sword/Shield", 
            description: "Galar is based on the United Kingdom and features Dynamax and Gigantamax transformations.",
            pokemon_count: 89, legendary: "Zacian, Zamazenta, Eternatus", icon: "🏰" },
        9: { name: "Paldea", generation: 9, starter: "Sprigatito, Fuecoco, Quaxly", games: "Scarlet/Violet", 
            description: "Paldea is based on the Iberian Peninsula and features an open-world design.",
            pokemon_count: 103, legendary: "Koraidon, Miraidon", icon: "🏖️" }
    };
    
    const region = regionsData[regionId];
    let pokemonList = [];
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    
    async function loadRegionPokemon() {
        if (regionId <= 6) {
            for (let id = (regionId === 1 ? 1 : regionId === 2 ? 152 : regionId === 3 ? 252 : regionId === 4 ? 387 : regionId === 5 ? 494 : 650);
                 id <= (regionId === 1 ? 151 : regionId === 2 ? 251 : regionId === 3 ? 386 : regionId === 4 ? 493 : regionId === 5 ? 649 : 721); id++) {
                if (pokemonList.length < 24) {
                    pokemonList.push({ id: id, name: `Loading...` });
                }
            }
        } else {
            const startIds = {7: 722, 8: 810, 9: 906};
            const endIds = {7: 809, 8: 905, 9: 1025};
            for (let id = startIds[regionId]; id <= Math.min(endIds[regionId], startIds[regionId] + 30); id++) {
                if (pokemonList.length < 24) {
                    try {
                        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                        const pokemon = await response.json();
                        pokemonList.push({ id: pokemon.id, name: pokemon.name.charAt(0).toUpperCase() + pokemon.name.slice(1) });
                    } catch(e) {}
                }
            }
        }
        
        for (let i = 0; i < pokemonList.length; i++) {
            if (pokemonList[i].name === "Loading...") {
                try {
                    const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonList[i].id}`);
                    const pokemon = await response.json();
                    pokemonList[i].name = pokemon.name.charAt(0).toUpperCase() + pokemon.name.slice(1);
                } catch(e) {}
            }
        }
        
        renderPage();
    }
    
    function renderPage() {
        const container = document.getElementById('container');
        container.innerHTML = `
            <div class="region-header">
                <div class="region-icon">${region.icon}</div>
                <h1>${region.name} Region</h1>
                
                <div class="region-info">
                    <div class="info-card"><h3>🌟 Generation</h3><p>${region.generation}</p></div>
                    <div class="info-card"><h3>🎮 Main Games</h3><p>${region.games}</p></div>
                    <div class="info-card"><h3>🍃 Starter Pokémon</h3><p>${region.starter}</p></div>
                    <div class="info-card"><h3>📊 Pokédex Count</h3><p>${region.pokemon_count} Pokémon</p></div>
                    <div class="info-card"><h3>✨ Legendaries</h3><p>${region.legendary}</p></div>
                </div>
                
                <div class="description"><p>📖 ${region.description}</p></div>
            </div>
            
            <div class="pokemon-section">
                <h2>🌟 Featured Pokémon from ${region.name} 🌟</h2>
                <div class="pokemon-grid">
                    ${pokemonList.map(p => `
                        <div class="pokemon-mini">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" 
                                 style="width: 80px; height: 80px;"
                                 onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'">
                            <br>
                            <a href="pokemon_detail.html?id=${p.id}">${p.name}</a>
                            <br>
                            <small>#${String(p.id).padStart(3, '0')}</small>
                        </div>
                    `).join('')}
                </div>
            </div>
            
            <div class="back-links">
                <a href="regions_list.html">← All Regions</a>
                <a href="start.html">🏠 Home</a>
            </div>
        `;
    }
    
    loadRegionPokemon();
</script>
</body>
</html>
