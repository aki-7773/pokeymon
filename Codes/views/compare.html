<!DOCTYPE html>
<html>
<head>
    <title>Compare Pokémon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
        }
        
        .compare-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        
        .pokemon-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        
        .vs {
            font-size: 48px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            border-radius: 25px;
            border: none;
        }
        
        .suggestions {
            background: white;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            width: calc(100% - 40px);
            z-index: 100;
        }
        
        .suggestions div {
            padding: 10px;
            cursor: pointer;
        }
        
        .suggestions div:hover {
            background: #ffcb05;
        }
        
        .stat-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .stat-fill {
            background: #2a75bb;
            height: 100%;
            color: white;
            line-height: 20px;
            padding-left: 5px;
            font-size: 12px;
        }
        
        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            margin: 3px;
        }
        
        .back-link {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        
        .dark-mode-toggle {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        @media (max-width: 768px) {
            .compare-container {
                grid-template-columns: 1fr;
            }
            .vs {
                font-size: 32px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="control-buttons">
    <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
    <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>
<div class="container">
    <h1>📊 Compare Pokémon 📊</h1>
    
    <div style="text-align: center;">
        <a href="/" class="back-link">← Back to Home</a>
        <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>
    
    <div class="compare-container">
        <div class="pokemon-card" id="leftCard">
            <div class="search-box">
                <input type="text" id="leftSearch" placeholder="Search Pokémon...">
                <div id="leftSuggestions" class="suggestions" style="display: none;"></div>
            </div>
            <div id="leftContent">
                <div style="padding: 50px; color: #666;">Select a Pokémon</div>
            </div>
        </div>
        
        <div class="vs">VS</div>
        
        <div class="pokemon-card" id="rightCard">
            <div class="search-box">
                <input type="text" id="rightSearch" placeholder="Search Pokémon...">
                <div id="rightSuggestions" class="suggestions" style="display: none;"></div>
            </div>
            <div id="rightContent">
                <div style="padding: 50px; color: #666;">Select a Pokémon</div>
            </div>
        </div>
    </div>
</div>

<script>
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    let leftPokemon = null;
    let rightPokemon = null;
    
    async function searchPokemon(query, side) {
        if (query.length < 2) return [];
        
        const response = await fetch(`/api/search?q=${query}`);
        const data = await response.json();
        return data.results;
    }
    
    async function loadPokemon(id, side) {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await response.json();
        
        const pokemon = {
            id: data.id,
            name: data.name.charAt(0).toUpperCase() + data.name.slice(1),
            image: data.sprites.other['official-artwork'].front_default || data.sprites.front_default,
            height: data.height / 10,
            weight: data.weight / 10,
            types: data.types.map(t => t.type.name),
            stats: {
                hp: data.stats[0].base_stat,
                attack: data.stats[1].base_stat,
                defense: data.stats[2].base_stat,
                spAttack: data.stats[3].base_stat,
                spDefense: data.stats[4].base_stat,
                speed: data.stats[5].base_stat
            }
        };
        
        return pokemon;
    }
    
    function renderPokemonCard(pokemon, side) {
        const container = document.getElementById(`${side}Content`);
        if (!pokemon) {
            container.innerHTML = '<div style="padding: 50px; color: #666;">Select a Pokémon</div>';
            return;
        }
        
        container.innerHTML = `
            <img src="${pokemon.image}" style="width: 150px;">
            <h2>${pokemon.name}</h2>
            <p>#${String(pokemon.id).padStart(3, '0')}</p>
            <p>📏 Height: ${pokemon.height} m | ⚖️ Weight: ${pokemon.weight} kg</p>
            <div class="type-badges">
                ${pokemon.types.map(t => `<span class="type-badge" style="background: ${typeColors[t]}">${t.charAt(0).toUpperCase() + t.slice(1)}</span>`).join('')}
            </div>
            <h3>Stats</h3>
            <div>HP: ${pokemon.stats.hp}</div>
            <div class="stat-bar"><div class="stat-fill" style="width: ${pokemon.stats.hp / 2.55}%">${pokemon.stats.hp}</div></div>
            <div>Attack: ${pokemon.stats.attack}</div>
            <div class="stat-bar"><div class="stat-fill" style="width: ${pokemon.stats.attack / 2.55}%">${pokemon.stats.attack}</div></div>
            <div>Defense: ${pokemon.stats.defense}</div>
            <div class="stat-bar"><div class="stat-fill" style="width: ${pokemon.stats.defense / 2.55}%">${pokemon.stats.defense}</div></div>
            <div>Sp. Attack: ${pokemon.stats.spAttack}</div>
            <div class="stat-bar"><div class="stat-fill" style="width: ${pokemon.stats.spAttack / 2.55}%">${pokemon.stats.spAttack}</div></div>
            <div>Sp. Defense: ${pokemon.stats.spDefense}</div>
            <div class="stat-bar"><div class="stat-fill" style="width: ${pokemon.stats.spDefense / 2.55}%">${pokemon.stats.spDefense}</div></div>
            <div>Speed: ${pokemon.stats.speed}</div>
            <div class="stat-bar"><div class="stat-fill" style="width: ${pokemon.stats.speed / 2.55}%">${pokemon.stats.speed}</div></div>
        `;
    }
    
    // Setup für beide Seiten
    function setupSearch(side) {
        const input = document.getElementById(`${side}Search`);
        const suggestionsDiv = document.getElementById(`${side}Suggestions`);
        
        input.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 2) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const results = await searchPokemon(query, side);
            if (results.length > 0) {
                suggestionsDiv.style.display = 'block';
                suggestionsDiv.innerHTML = results.map(r => 
                    `<div onclick="selectPokemon(${r.id}, '${side}')">${r.name.charAt(0).toUpperCase() + r.name.slice(1)}</div>`
                ).join('');
            } else {
                suggestionsDiv.style.display = 'none';
            }
        });
    }
    
    async function selectPokemon(id, side) {
        const pokemon = await loadPokemon(id, side);
        if (side === 'left') {
            leftPokemon = pokemon;
            renderPokemonCard(leftPokemon, 'left');
        } else {
            rightPokemon = pokemon;
            renderPokemonCard(rightPokemon, 'right');
        }
        
        document.getElementById(`${side}Suggestions`).style.display = 'none';
        document.getElementById(`${side}Search`).value = '';
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    
    setupSearch('left');
    setupSearch('right');
</script>
<script src="/static/lang.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.getElementById('darkModeBtn');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    function changeLanguage(lang) {
        setLanguage(lang);
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeBtn').innerHTML = '☀️ Light Mode';
    }
    
    document.getElementById('languageSelect').value = localStorage.getItem('language') || 'en';
</script>
</body>
</html>
