<!DOCTYPE html>
<html>
<head>
    <title>My Pokémon Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
        }
        
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .team-slot {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        body.dark-mode .team-slot {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .team-slot img {
            width: 120px;
            height: 120px;
        }
        
        .team-slot h3 {
            color: #2a75bb;
            margin: 10px 0;
        }
        
        body.dark-mode .team-slot h3 {
            color: #ffcb05;
        }
        
        .empty-slot {
            opacity: 0.6;
            cursor: pointer;
        }
        
        .empty-slot:hover {
            opacity: 1;
            transform: scale(1.02);
        }
        
        .remove-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .back-link {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        
        .share-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .team-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<div class="container">
    <h1>⭐ My Pokémon Team ⭐</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="start.html" class="back-link">← Back to Home</a>
        <a href="pokemon_list.html" class="back-link">📋 All Pokémon</a>
        <a href="share_team.html" class="share-btn">📤 Share Team</a>
    </div>
    
    <div class="team-grid" id="teamGrid">
        <div class="loading">Loading your team...</div>
    </div>
</div>

<script>
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let pokemonData = {};
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    
    async function loadTeam() {
        const grid = document.getElementById('teamGrid');
        
        if (favorites.length === 0) {
            grid.innerHTML = `
                <div class="team-slot empty-slot" onclick="location.href='pokemon_list.html'">
                    <div style="font-size: 48px;">➕</div>
                    <p>Add Pokémon to your team</p>
                    <p style="font-size: 12px;">Click to browse Pokémon</p>
                </div>
            `;
            return;
        }
        
        const slots = [];
        for (let i = 0; i < 6; i++) {
            if (favorites[i]) {
                const pokemon = await fetchPokemonData(favorites[i]);
                slots.push(`
                    <div class="team-slot">
                        <img src="${pokemon.image}" alt="${pokemon.name}">
                        <h3>${pokemon.name}</h3>
                        <p>#${String(pokemon.id).padStart(3, '0')}</p>
                        <button class="remove-btn" onclick="removeFromTeam(${pokemon.id})">Remove</button>
                        <button class="remove-btn" onclick="location.href='pokemon_detail.html?id=${pokemon.id}'" style="background:#2a75bb; margin-top:5px;">View</button>
                    </div>
                `);
            } else {
                slots.push(`
                    <div class="team-slot empty-slot" onclick="location.href='pokemon_list.html'">
                        <div style="font-size: 48px;">➕</div>
                        <p>Empty Slot</p>
                        <p style="font-size: 12px;">Click to add Pokémon</p>
                    </div>
                `);
            }
        }
        
        grid.innerHTML = slots.join('');
    }
    
    async function fetchPokemonData(id) {
        if (pokemonData[id]) return pokemonData[id];
        
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await response.json();
        
        const pokemon = {
            id: data.id,
            name: data.name.charAt(0).toUpperCase() + data.name.slice(1),
            image: data.sprites.other['official-artwork'].front_default || data.sprites.front_default
        };
        
        pokemonData[id] = pokemon;
        return pokemon;
    }
    
    function removeFromTeam(id) {
        favorites = favorites.filter(f => f !== id);
        localStorage.setItem('favorites', JSON.stringify(favorites));
        loadTeam();
    }
    
    loadTeam();
</script>
</body>
</html>
