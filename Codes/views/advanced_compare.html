<!DOCTYPE html>
<html>
<head>
    <title>Advanced Pokémon Compare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .add-pokemon {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 25px;
        }
        
        body.dark-mode .add-pokemon {
            background: rgba(0,0,0,0.8);
        }
        
        .add-pokemon input {
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid #ddd;
            width: 200px;
        }
        
        .add-pokemon button {
            padding: 10px 20px;
            background: #2a75bb;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .comparison-table {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 20px;
            overflow-x: auto;
            margin: 20px 0;
        }
        
        body.dark-mode .comparison-table {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        
        body.dark-mode th, body.dark-mode td {
            border-color: #444;
        }
        
        th {
            background: #2a75bb;
            color: white;
        }
        
        body.dark-mode th {
            background: #1e5a9e;
        }
        
        .pokemon-cell {
            min-width: 150px;
        }
        
        .pokemon-cell img {
            width: 80px;
            height: 80px;
        }
        
        .pokemon-cell h3 {
            margin: 10px 0;
            color: #2a75bb;
        }
        
        body.dark-mode .pokemon-cell h3 {
            color: #ffcb05;
        }
        
        .remove-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .stat-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            margin: 5px 0;
            overflow: hidden;
        }
        
        body.dark-mode .stat-bar {
            background: #444;
        }
        
        .stat-fill {
            background: #2a75bb;
            height: 100%;
            color: white;
            line-height: 20px;
            padding-left: 5px;
            font-size: 11px;
        }
        
        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            margin: 2px;
        }
        
        .effectiveness-cell {
            font-size: 12px;
        }
        
        .effective { background: #4caf50; color: white; }
        .not-effective { background: #f44336; color: white; }
        .immune { background: #9e9e9e; color: white; }
        
        .winner {
            background: rgba(76, 175, 80, 0.3);
        }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .pokemon-cell img {
                width: 50px;
                height: 50px;
            }
            th, td {
                padding: 5px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
<button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<div class="container">
    <h1>📊 Advanced Pokémon Comparison 📊</h1>
    
    <div class="nav-buttons">
        <a href="start.html" class="nav-btn">← Home</a>
        <a href="compare.html" class="nav-btn">Simple Compare</a>
        <a href="pokemon_list.html" class="nav-btn">📋 All Pokémon</a>
    </div>
    
    <div class="controls">
        <div class="add-pokemon">
            <input type="text" id="pokemonInput" placeholder="Pokémon name or ID...">
            <button onclick="addPokemon()">➕ Add Pokémon</button>
        </div>
        <button onclick="clearAll()" style="background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer;">🗑️ Clear All</button>
    </div>
    
    <div class="comparison-table" id="comparisonContainer">
        <div style="text-align: center; padding: 40px;">
            <p>✨ Add up to 6 Pokémon to compare them side by side! ✨</p>
            <p style="margin-top: 10px;">Try: pikachu, charizard, mewtwo, greninja, lucario, gengar</p>
        </div>
    </div>
</div>

<script>
    let pokemonList = [];
    let maxPokemon = 6;
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    const effectiveness = {
        normal: {rock: 0.5, ghost: 0, steel: 0.5},
        fire: {fire: 0.5, water: 0.5, grass: 2, ice: 2, bug: 2, rock: 0.5, dragon: 0.5, steel: 2},
        water: {fire: 2, water: 0.5, grass: 0.5, ground: 2, rock: 2, dragon: 0.5},
        electric: {water: 2, electric: 0.5, grass: 0.5, ground: 0, flying: 2, dragon: 0.5},
        grass: {fire: 0.5, water: 2, grass: 0.5, poison: 0.5, ground: 2, flying: 0.5, bug: 0.5, rock: 2, dragon: 0.5, steel: 0.5},
        ice: {fire: 0.5, water: 0.5, grass: 2, ice: 0.5, ground: 2, flying: 2, dragon: 2, steel: 0.5},
        fighting: {normal: 2, ice: 2, poison: 0.5, flying: 0.5, psychic: 0.5, bug: 0.5, rock: 2, ghost: 0, dark: 2, steel: 2, fairy: 0.5},
        poison: {grass: 2, poison: 0.5, ground: 0.5, rock: 0.5, ghost: 0.5, steel: 0, fairy: 2},
        ground: {fire: 2, electric: 2, grass: 0.5, poison: 2, rock: 2, bug: 0.5, steel: 2},
        flying: {grass: 2, electric: 0.5, fighting: 2, bug: 2, rock: 0.5, steel: 0.5},
        psychic: {fighting: 2, poison: 2, psychic: 0.5, dark: 0, steel: 0.5},
        bug: {fire: 0.5, grass: 2, fighting: 0.5, poison: 0.5, flying: 0.5, psychic: 2, ghost: 0.5, dark: 2, steel: 0.5, fairy: 0.5},
        rock: {fire: 2, ice: 2, fighting: 0.5, ground: 0.5, flying: 2, bug: 2, steel: 0.5},
        ghost: {normal: 0, psychic: 2, ghost: 2, dark: 0.5},
        dragon: {dragon: 2, steel: 0.5, fairy: 0},
        dark: {fighting: 0.5, psychic: 2, ghost: 2, dark: 0.5, fairy: 0.5},
        steel: {fire: 0.5, water: 0.5, electric: 0.5, ice: 2, rock: 2, steel: 0.5, fairy: 2},
        fairy: {fire: 0.5, fighting: 2, poison: 0.5, dragon: 2, dark: 2, steel: 0.5}
    };
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
        if (pokemonList.length > 0) renderComparison();
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    
    async function searchPokemon(query) {
        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${query.toLowerCase()}`);
            if (response.ok) {
                const data = await response.json();
                return data;
            }
        } catch(e) {}
        return null;
    }
    
    async function addPokemon() {
        const input = document.getElementById('pokemonInput');
        const query = input.value.trim();
        
        if (!query) {
            alert('Please enter a Pokémon name or ID!');
            return;
        }
        
        if (pokemonList.length >= maxPokemon) {
            alert(`You can only compare up to ${maxPokemon} Pokémon at once!`);
            return;
        }
        
        const pokemon = await searchPokemon(query);
        if (!pokemon) {
            alert(`Pokémon "${query}" not found!`);
            return;
        }
        
        if (pokemonList.some(p => p.id === pokemon.id)) {
            alert(`${pokemon.name} is already in the comparison!`);
            return;
        }
        
        const types = pokemon.types.map(t => t.type.name);
        const stats = {
            hp: pokemon.stats[0].base_stat,
            attack: pokemon.stats[1].base_stat,
            defense: pokemon.stats[2].base_stat,
            spAttack: pokemon.stats[3].base_stat,
            spDefense: pokemon.stats[4].base_stat,
            speed: pokemon.stats[5].base_stat,
            total: pokemon.stats.reduce((sum, s) => sum + s.base_stat, 0)
        };
        
        pokemonList.push({
            id: pokemon.id,
            name: pokemon.name.charAt(0).toUpperCase() + pokemon.name.slice(1),
            image: pokemon.sprites.other['official-artwork'].front_default || pokemon.sprites.front_default,
            types: types,
            stats: stats,
            height: pokemon.height / 10,
            weight: pokemon.weight / 10,
            baseExp: pokemon.base_experience
        });
        
        input.value = '';
        renderComparison();
    }
    
    function getEffectivenessMultiplier(attackType, defenseTypes) {
        let multiplier = 1;
        for (let defenseType of defenseTypes) {
            if (effectiveness[attackType] && effectiveness[attackType][defenseType]) {
                multiplier *= effectiveness[attackType][defenseType];
            }
        }
        return multiplier;
    }
    
    function getEffectivenessClass(multiplier) {
        if (multiplier === 0) return 'immune';
        if (multiplier < 1) return 'not-effective';
        if (multiplier > 1) return 'effective';
        return '';
    }
    
    function getEffectivenessSymbol(multiplier) {
        if (multiplier === 0) return '0✗';
        if (multiplier === 0.25) return '¼✗';
        if (multiplier === 0.5) return '½✗';
        if (multiplier === 2) return '2✓';
        if (multiplier === 4) return '4✓';
        return '1✗';
    }
    
    function getTotalWinner() {
        if (pokemonList.length === 0) return null;
        return Math.max(...pokemonList.map(p => p.stats.total));
    }
    
    function renderComparison() {
        const container = document.getElementById('comparisonContainer');
        
        if (pokemonList.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <p>✨ Add up to 6 Pokémon to compare them side by side! ✨</p>
                    <p style="margin-top: 10px;">Try: pikachu, charizard, mewtwo, greninja, lucario, gengar</p>
                </div>
            `;
            return;
        }
        
        const maxTotal = getTotalWinner();
        
        let html = '<table>';
        
        html += '<thead><tr><th>Attribute</th>';
        for (let p of pokemonList) {
            html += `<th class="pokemon-cell">
                        <button class="remove-btn" onclick="removePokemon(${p.id})">✖</button>
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'">
                        <h3>${p.name}</h3>
                        <div>#${String(p.id).padStart(3, '0')}</div>
                    </th>`;
        }
        html += '</thead><tbody>';
        
        html += `<tr><td><strong>📏 Height</strong></td>${pokemonList.map(p => `<td>${p.height} m</td>`).join('')}</tr>`;
        html += `<tr><td><strong>⚖️ Weight</strong></td>${pokemonList.map(p => `<td>${p.weight} kg</td>`).join('')}</tr>`;
        html += `<tr><td><strong>🎮 Base Exp</strong></td>${pokemonList.map(p => `<td>${p.baseExp}</td>`).join('')}</tr>`;
        html += `<tr><td><strong>🌈 Types</strong></td>${pokemonList.map(p => `<td>${p.types.map(t => `<span class="type-badge" style="background: ${typeColors[t]}">${t.toUpperCase()}</span>`).join('')}</td>`).join('')}</tr>`;
        
        const statNames = [
            { key: 'hp', name: '❤️ HP', max: 255 },
            { key: 'attack', name: '⚔️ Attack', max: 255 },
            { key: 'defense', name: '🛡️ Defense', max: 255 },
            { key: 'spAttack', name: '🔮 Sp. Attack', max: 255 },
            { key: 'spDefense', name: '✨ Sp. Defense', max: 255 },
            { key: 'speed', name: '⚡ Speed', max: 255 },
            { key: 'total', name: '⭐ Total', max: 1000 }
        ];
        
        for (let stat of statNames) {
            const values = pokemonList.map(p => p.stats[stat.key]);
            const maxVal = Math.max(...values);
            
            html += `<tr${stat.key === 'total' ? ' style="border-top: 2px solid #ffcb05;"' : ''}>`;
            html += `<td><strong>${stat.name}</strong></td>`;
            for (let i = 0; i < pokemonList.length; i++) {
                const p = pokemonList[i];
                const value = p.stats[stat.key];
                const percentage = (value / stat.max) * 100;
                const isWinner = value === maxVal && values.length > 1;
                html += `<td class="${isWinner ? 'winner' : ''}">
                            <strong>${value}</strong>
                            <div class="stat-bar"><div class="stat-fill" style="width: ${Math.min(percentage, 100)}%">${value}</div></div>
                         </td>`;
            }
            html += '</tr>';
        }
        
        const allTypes = Object.keys(typeColors);
        html += `<tr style="border-top: 2px solid #ffcb05;"><td colspan="${pokemonList.length + 1}" style="background: rgba(255,203,5,0.2);"><strong>⚔️ Type Effectiveness (Attack vs Defense)</strong></td></tr>`;
        
        for (let attackType of allTypes.slice(0, 10)) {
            html += `<tr><td><span class="type-badge" style="background: ${typeColors[attackType]}">${attackType.toUpperCase()}</span> attack</td>`;
            for (let p of pokemonList) {
                const multiplier = getEffectivenessMultiplier(attackType, p.types);
                const className = getEffectivenessClass(multiplier);
                const symbol = getEffectivenessSymbol(multiplier);
                html += `<td class="${className} effectiveness-cell">${symbol}</td>`;
            }
            html += '</tr>';
        }
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function removePokemon(id) {
        pokemonList = pokemonList.filter(p => p.id !== id);
        renderComparison();
    }
    
    function clearAll() {
        pokemonList = [];
        renderComparison();
    }
    
    document.getElementById('pokemonInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addPokemon();
        }
    });
</script>
</body>
</html>
