<!DOCTYPE html>
<html>
<head>
    <title>Offline - Pokémon Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            max-width: 500px;
            margin: 20px;
        }
        
        h1 {
            color: #2a75bb;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 30px;
            background: #ffcb05;
            color: #2a75bb;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
        }
        
        button:hover {
            background: #f5b700;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected.</p>
    <p>Please check your connection and try again.</p>
    <button onclick="location.reload()">🔄 Try Again</button>
    <button onclick="location.href='/'">🏠 Go to Home</button>
</div>
</body>
</html>
