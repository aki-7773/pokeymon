<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Detail</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f5f5f5; margin: 0; padding: 20px; position: relative; transition: all 0.3s; }
        body.dark-mode { background: #1a1a2e; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        body.dark-mode .container { background: rgba(0,0,0,0.9); color: white; }
        .control-buttons { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .dark-mode-toggle, .language-select { background: #2a75bb; color: white; border: none; padding: 8px 15px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .nav-prev, .nav-next { position: fixed; top: 50%; transform: translateY(-50%); background: #2a75bb; color: white; width: 50px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 10px; border: none; cursor: pointer; z-index: 100; }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }
        .nav-prev:hover, .nav-next:hover { background: #ffcb05; color: #2a75bb; }
        img { width: 200px; margin: 10px; }
        ul { list-style: none; padding: 0; }
        li { display: inline-block; margin: 5px; padding: 5px 10px; border-radius: 5px; }
        .info { text-align: left; margin: 20px; }
        .type-badge { display: inline-block; padding: 5px 12px; margin: 3px; border-radius: 15px; color: white; font-weight: bold; }
        .ability-item { background: #e0e0e0; color: #333; display: inline-block; padding: 5px 12px; margin: 3px; border-radius: 15px; }
        body.dark-mode .ability-item { background: #555; color: #eee; }
        .stat-bar { background: #e0e0e0; border-radius: 10px; height: 20px; margin: 5px 0; overflow: hidden; }
        .stat-fill { background: #2a75bb; height: 100%; color: white; line-height: 20px; padding-left: 5px; font-size: 11px; }
        .dex-entry { background: #f0f0f0; padding: 15px; border-radius: 10px; margin-top: 20px; font-style: italic; }
        body.dark-mode .dex-entry { background: #333; color: #eee; }
        .evolution-tree { margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 15px; }
        body.dark-mode .evolution-tree { background: #333; }
        .evolution-chain { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 20px; }
        .evolution-node { text-align: center; }
        .evolution-node img { width: 80px; height: 80px; }
        .evolution-node a { display: block; margin-top: 5px; font-size: 12px; text-decoration: none; color: #2a75bb; }
        body.dark-mode .evolution-node a { color: #ffcb05; }
        .evolution-arrow { font-size: 24px; color: #2a75bb; }
        .cry-button, .print-btn { background: #2a75bb; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin: 10px 5px; font-size: 14px; font-weight: bold; }
        .cry-button:hover, .print-btn:hover { background: #ffcb05; color: #2a75bb; }
        .back-link { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ffcb05; color: #2a75bb; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ffcb05; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .nav-prev, .nav-next { width: 40px; height: 60px; font-size: 30px; }
            .nav-prev { left: 5px; }
            .nav-next { right: 5px; }
            .evolution-chain { gap: 10px; }
            .evolution-node img { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
<div class="control-buttons">
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option><option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option><option value="es">🇪🇸 Español</option>
    </select>
</div>

<button class="nav-prev" onclick="goToPrev()">&#10094;</button>
<button class="nav-next" onclick="goToNext()">&#10095;</button>

<div class="container">
    <h1 id="pokemonName">Loading...</h1>
    <button class="cry-button" onclick="playCry()">🔊 Play Cry</button>
    <button class="print-btn" onclick="window.print()">🖨️ Print / PDF</button>
    
    <div class="pokemon-img"><img id="pokemonImage" src="" alt=""></div>
    <div class="info" id="pokemonInfo"></div>
    <h3>📊 Base Stats</h3>
    <div id="statsContainer"></div>
    <div class="dex-entry" id="dexEntry">Loading Pokédex entry...</div>
    <div class="evolution-tree" id="evolutionTree"><h3>🌳 Evolution Tree</h3><div class="loader"></div></div>
    <a href="start.html" class="back-link">← Back to Home</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pokemonId = parseInt(urlParams.get('id'));
    let pokemonData = null;
    let currentPokemonId = pokemonId;
    let currentLang = localStorage.getItem('language') || 'en';
    
    const typeColors = {
        normal: "#A8A878", fire: "#F08030", water: "#6890F0",
        electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
        fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
        flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
        rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
        dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
    };
    
    // Mapping für spezielle Formen zur Basis-Form
    const specialFormBase = {
        10003: { baseId: 658, baseName: "greninja", displayName: "Ash-Greninja" },
        10034: { baseId: 6, baseName: "charizard", displayName: "Mega Charizard X" },
        10035: { baseId: 6, baseName: "charizard", displayName: "Mega Charizard Y" },
        10036: { baseId: 150, baseName: "mewtwo", displayName: "Mega Mewtwo X" },
        10037: { baseId: 150, baseName: "mewtwo", displayName: "Mega Mewtwo Y" },
        10038: { baseId: 94, baseName: "gengar", displayName: "Mega Gengar" },
        10039: { baseId: 130, baseName: "gyarados", displayName: "Mega Gyarados" },
        10040: { baseId: 142, baseName: "aerodactyl", displayName: "Mega Aerodactyl" },
        10072: { baseId: 6, baseName: "charizard", displayName: "Gigantamax Charizard" },
        10073: { baseId: 25, baseName: "pikachu", displayName: "Gigantamax Pikachu" },
        10074: { baseId: 133, baseName: "eevee", displayName: "Gigantamax Eevee" },
        10075: { baseId: 52, baseName: "meowth", displayName: "Gigantamax Meowth" },
        10076: { baseId: 94, baseName: "gengar", displayName: "Gigantamax Gengar" }
    };
    
    function getTypeColor(type) { return typeColors[type] || "#68A090"; }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        btn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
    }
    
    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
    }
    
    function goToPrev() {
        let prevId = currentPokemonId - 1;
        if (prevId < 1) prevId = 1025;
        window.location.href = `pokemon_detail.html?id=${prevId}`;
    }
    
    function goToNext() {
        let nextId = currentPokemonId + 1;
        if (nextId > 1025) nextId = 1;
        window.location.href = `pokemon_detail.html?id=${nextId}`;
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    document.getElementById('languageSelect').value = currentLang;
    
    async function playCry() {
        if (!pokemonData) return;
        try {
            const cryUrl = pokemonData.cries?.latest || pokemonData.cries?.legacy;
            if (cryUrl) { const audio = new Audio(cryUrl); audio.volume = 0.3; audio.play(); }
        } catch(e) { console.log('Cry error:', e); }
    }
    
    async function getPokedexEntry(speciesId) {
        try {
            const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${speciesId}`);
            if (speciesRes.ok) {
                const species = await speciesRes.json();
                for (let entry of species.flavor_text_entries) {
                    if (entry.language.name === "en") {
                        return entry.flavor_text.replace(/\n/g, ' ').replace(/\f/g, ' ');
                    }
                }
            }
        } catch(e) {}
        return "No Pokédex entry available.";
    }
    
    async function loadEvolutionTree(baseId) {
        const container = document.getElementById('evolutionTree');
        container.innerHTML = '<h3>🌳 Evolution Tree</h3><div class="loader"></div>';
        try {
            const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${baseId}`);
            if (!speciesRes.ok) throw new Error('Species not found');
            const speciesData = await speciesRes.json();
            const chainRes = await fetch(speciesData.evolution_chain.url);
            const chainData = await chainRes.json();
            
            let evolutionChain = [];
            let current = chainData.chain;
            function collectEvolutions(chain, list) {
                list.push(chain.species.name);
                if (chain.evolves_to && chain.evolves_to.length > 0) {
                    for (let evo of chain.evolves_to) collectEvolutions(evo, list);
                }
            }
            collectEvolutions(current, evolutionChain);
            evolutionChain = [...new Set(evolutionChain)];
            
            async function getDetails(name) {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                const data = await res.json();
                return { id: data.id, name: data.name };
            }
            
            let html = '<h3>🌳 Evolution Tree</h3><div class="evolution-chain">';
            for (let i = 0; i < evolutionChain.length; i++) {
                const details = await getDetails(evolutionChain[i]);
                const displayName = details.name.charAt(0).toUpperCase() + details.name.slice(1);
                html += `<div class="evolution-node"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${details.id}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${details.id}.png'"><a href="pokemon_detail.html?id=${details.id}">${displayName}</a></div>`;
                if (i < evolutionChain.length - 1) html += '<div class="evolution-arrow">→</div>';
            }
            html += '</div>';
            if (evolutionChain.length === 1) html = '<h3>🌳 Evolution Tree</h3><p>This Pokémon does not evolve</p>';
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<h3>🌳 Evolution Tree</h3><p>Evolution data not available</p>';
        }
    }
    
    async function loadPokemonDetail() {
        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonId}`);
            pokemonData = await response.json();
            currentPokemonId = pokemonData.id;
            
            const isSpecial = pokemonId > 10000;
            let displayName = pokemonData.name.charAt(0).toUpperCase() + pokemonData.name.slice(1);
            let baseId = pokemonId;
            let dexText = "";
            
            if (isSpecial && specialFormBase[pokemonId]) {
                displayName = specialFormBase[pokemonId].displayName;
                baseId = specialFormBase[pokemonId].baseId;
                dexText = await getPokedexEntry(baseId);
                loadEvolutionTree(baseId);
            } else {
                dexText = await getPokedexEntry(pokemonId);
                loadEvolutionTree(pokemonId);
            }
            
            let region = pokemonData.id <= 809 ? "Alola" : (pokemonData.id <= 905 ? "Galar" : "Paldea");
            
            document.getElementById('pokemonName').textContent = displayName;
            document.getElementById('pokemonImage').src = pokemonData.sprites.other['official-artwork'].front_default || pokemonData.sprites.front_default;
            document.getElementById('dexEntry').innerHTML = `<strong>📖 Pokédex Entry</strong><br>"${dexText}"`;
            
            document.getElementById('pokemonInfo').innerHTML = `
                <p><strong>ID:</strong> #${pokemonData.id}</p>
                <p><strong>Height:</strong> ${pokemonData.height / 10} m</p>
                <p><strong>Weight:</strong> ${pokemonData.weight / 10} kg</p>
                <p><strong>Base Experience:</strong> ${pokemonData.base_experience}</p>
                <p><strong>Types:</strong></p>
                <ul>${pokemonData.types.map(t => `<li class="type-badge" style="background: ${getTypeColor(t.type.name)}">${t.type.name.toUpperCase()}</li>`).join('')}</ul>
                <p><strong>Abilities:</strong></p>
                <ul>${pokemonData.abilities.map(a => `<li class="ability-item">${a.ability.name.replace("-", " ").toUpperCase()}${a.is_hidden ? ' (Hidden)' : ''}</li>`).join('')}</ul>
                <p><strong>Region:</strong> ${region}</p>
            `;
            
            document.getElementById('statsContainer').innerHTML = pokemonData.stats.map(s => `
                <div><strong>${s.stat.name.toUpperCase()}:</strong> ${s.base_stat}</div>
                <div class="stat-bar"><div class="stat-fill" style="width: ${s.base_stat / 2.55}%">${s.base_stat}</div></div>
            `).join('');
            
        } catch (error) {
            document.querySelector('.container').innerHTML = '<p>❌ Error loading Pokémon. Please try again.</p>';
        }
    }
    
    loadPokemonDetail();
</script>
</body>
</html>
