<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pokémon Detail - Special Form</title>
    <style>
        /* ========== GLOBALE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
            padding: 20px;
            position: relative;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.06) 2px, transparent 2px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.97);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
        }
        
        body.dark-mode .container {
            background: rgba(0,0,0,0.88);
            color: #e0e0e0;
        }
        
        /* ========== NAVIGATION ========== */
        .nav-prev, .nav-next {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(42,117,187,0.9);
            color: white;
            width: 55px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            border-radius: 30px;
            transition: all 0.3s;
            z-index: 100;
            border: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }
        
        .nav-prev:hover, .nav-next:hover {
            background: #ffcb05;
            color: #2a75bb;
            transform: translateY(-50%) scale(1.05);
        }
        
        /* ========== STEUERUNGSBUTTONS ========== */
        .control-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        
        .dark-mode-toggle, .language-select {
            background: rgba(42,117,187,0.9);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }
        
        .dark-mode-toggle:hover, .language-select:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        /* ========== HEADER ========== */
        .pokemon-header h1 {
            color: #2a75bb;
            font-size: 36px;
            margin-bottom: 8px;
        }
        
        body.dark-mode .pokemon-header h1 {
            color: #ffcb05;
        }
        
        .pokemon-id {
            font-size: 15px;
            color: #777;
        }
        
        .pokemon-image {
            width: 250px;
            height: 250px;
            object-fit: contain;
            margin: 15px auto;
            display: block;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.2));
        }
        
        /* ========== BUTTONS ========== */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .cry-button, .print-btn {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .cry-button:hover, .print-btn:hover {
            background: #ffcb05;
            color: #2a75bb;
            transform: scale(1.02);
        }
        
        /* ========== INFO ========== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            background: rgba(0,0,0,0.04);
            padding: 15px;
            border-radius: 20px;
        }
        
        body.dark-mode .info-grid {
            background: rgba(255,255,255,0.05);
        }
        
        .info-card {
            background: white;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }
        
        body.dark-mode .info-card {
            background: rgba(30,30,40,0.9);
        }
        
        .info-label {
            font-weight: bold;
            color: #2a75bb;
            margin-bottom: 5px;
        }
        
        .type-badge-list, .ability-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            margin: 15px 0;
        }
        
        .type-badge {
            padding: 6px 18px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 13px;
        }
        
        .ability-item {
            background: #e8e8e8;
            padding: 6px 16px;
            border-radius: 30px;
        }
        
        body.dark-mode .ability-item {
            background: #3a3a4a;
            color: #eee;
        }
        
        /* ========== STATS ========== */
        .stat-bar-bg {
            background: #e0e0e0;
            border-radius: 20px;
            height: 24px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .stat-bar-fill {
            background: linear-gradient(90deg, #2a75bb, #4a95db);
            height: 100%;
            color: white;
            line-height: 24px;
            padding-left: 10px;
            border-radius: 20px;
        }
        
        /* ========== DEX ENTRY ========== */
        .dex-entry {
            background: #f5f0e8;
            padding: 18px;
            border-radius: 20px;
            margin: 20px 0;
            font-style: italic;
            border-left: 5px solid #ffcb05;
        }
        
        body.dark-mode .dex-entry {
            background: #2a2a3a;
        }
        
        /* ========== EVOLUTION ========== */
        .evolution-section {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }
        
        body.dark-mode .evolution-section {
            background: #2a2a3a;
        }
        
        .evolution-chain {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .evolution-node {
            text-align: center;
        }
        
        .evolution-node img {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            padding: 6px;
        }
        
        .evolution-arrow {
            font-size: 24px;
            font-weight: bold;
            color: #2a75bb;
        }
        
        .special-badge {
            background: #ff9800;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 5px;
            display: inline-block;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 28px;
            background: #ffcb05;
            color: #2a75bb;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            text-align: center;
        }
        
        .loader-small {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .nav-prev, .nav-next { width: 40px; height: 65px; font-size: 28px; }
            .nav-prev { left: 5px; }
            .nav-next { right: 5px; }
            .pokemon-image { width: 180px; height: 180px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="control-buttons">
    <button class="dark-mode-toggle" id="darkModeBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>

<button class="nav-prev" onclick="navigatePrev()">◀</button>
<button class="nav-next" onclick="navigateNext()">▶</button>

<div class="container" id="mainContainer">
    <div class="loader-small" style="margin: 60px auto;"></div>
    <p style="text-align: center;">Loading special form data...</p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let currentPokemonId = parseInt(urlParams.get('id')) || 10034;
    let pokemonData = null;
    
    const typeColors = {
        normal: "#A8A77A", fire: "#EE8130", water: "#6390F0",
        electric: "#F7D02C", grass: "#7AC74C", ice: "#96D9D6",
        fighting: "#C22E28", poison: "#A33EA1", ground: "#E2BF65",
        flying: "#A98FF3", psychic: "#F95587", bug: "#A6B91A",
        rock: "#B6A136", ghost: "#735797", dragon: "#6F35FC",
        dark: "#705746", steel: "#B7B7CE", fairy: "#D685AD"
    };
    
    const specialFormData = {
        10003: { name: "Ash-Greninja", baseId: 658, baseName: "greninja" },
        10034: { name: "Mega Charizard X", baseId: 6, baseName: "charizard" },
        10035: { name: "Mega Charizard Y", baseId: 6, baseName: "charizard" },
        10036: { name: "Mega Mewtwo X", baseId: 150, baseName: "mewtwo" },
        10037: { name: "Mega Mewtwo Y", baseId: 150, baseName: "mewtwo" },
        10038: { name: "Mega Gengar", baseId: 94, baseName: "gengar" },
        10080: { name: "Primal Kyogre", baseId: 382, baseName: "kyogre" },
        10081: { name: "Primal Groudon", baseId: 383, baseName: "groudon" },
        10072: { name: "Gigantamax Charizard", baseId: 6, baseName: "charizard" },
        10076: { name: "Gigantamax Gengar", baseId: 94, baseName: "gengar" }
    };
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.getElementById('darkModeBtn');
        btn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
    }
    
    function changeLanguage(lang) {
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeBtn').innerHTML = '☀️ Light Mode';
    }
    document.getElementById('languageSelect').value = localStorage.getItem('language') || 'en';
    
    function navigatePrev() {
        let newId = currentPokemonId - 1;
        if (newId < 10000) newId = 1025;
        window.location.href = `pokemon_detail.html?id=${newId}`;
    }
    
    function navigateNext() {
        let newId = currentPokemonId + 1;
        if (newId > 1025 && newId < 10000) newId = 10000;
        if (newId > 10090) newId = 1;
        window.location.href = `pokemon_detail.html?id=${newId}`;
    }
    
    async function playCry() {
        if (!pokemonData) return;
        try {
            const cryUrl = pokemonData.cries?.latest || pokemonData.cries?.legacy;
            if (cryUrl) {
                const audio = new Audio(cryUrl);
                audio.volume = 0.3;
                audio.play();
            }
        } catch(e) {}
    }
    
    async function loadEvolutionTree(baseId, specialName) {
        const container = document.getElementById('evolutionTree');
        if (!container) return;
        container.innerHTML = '<div class="loader-small"></div><p style="text-align:center;">Loading evolution...</p>';
        
        try {
            const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${baseId}`);
            if (!speciesRes.ok) throw new Error();
            const species = await speciesRes.json();
            const chainRes = await fetch(species.evolution_chain.url);
            const chainData = await chainRes.json();
            
            let evoChain = [];
            let current = chainData.chain;
            function collect(chain, list) {
                list.push(chain.species.name);
                if (chain.evolves_to?.length) collect(chain.evolves_to[0], list);
            }
            collect(current, evoChain);
            
            const evos = [];
            for (const name of evoChain) {
                const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                const d = await r.json();
                evos.push({ id: d.id, name: name.charAt(0).toUpperCase() + name.slice(1) });
            }
            
            let html = '<div class="evolution-chain">';
            for (let i = 0; i < evos.length; i++) {
                html += `<div class="evolution-node"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${evos[i].id}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${evos[i].id}.png'"><a href="pokemon_detail.html?id=${evos[i].id}">${evos[i].name}</a></div>`;
                if (i < evos.length - 1) html += '<div class="evolution-arrow">→</div>';
            }
            html += `<div class="evolution-arrow">→</div><div class="evolution-node"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentPokemonId}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'"><div><strong>${specialName}</strong></div><div class="special-badge">Special Form</div></div>`;
            html += '</div>';
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = '<p>Evolution data not available for this special form.</p>';
        }
    }
    
    async function loadPokemonDetail() {
        const container = document.getElementById('mainContainer');
        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${currentPokemonId}`);
            pokemonData = await response.json();
            
            const special = specialFormData[currentPokemonId];
            const displayName = special?.name || pokemonData.name.charAt(0).toUpperCase() + pokemonData.name.slice(1);
            const baseId = special?.baseId || currentPokemonId;
            
            let dexText = "Special form of a Pokémon. No unique Pokédex entry available.";
            if (special) {
                try {
                    const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${baseId}`);
                    const species = await speciesRes.json();
                    for (let entry of species.flavor_text_entries) {
                        if (entry.language.name === "en") {
                            dexText = entry.flavor_text.replace(/\n/g, ' ').replace(/\f/g, ' ');
                            break;
                        }
                    }
                } catch(e) {}
            }
            
            const stats = pokemonData.stats.map(s => s.base_stat);
            const total = stats.reduce((a, b) => a + b, 0);
            
            let region = "Unknown";
            if (pokemonData.id <= 809) region = "Alola/Galar";
            else region = "Paldea";
            
            container.innerHTML = `
                <div class="pokemon-header">
                    <h1>${displayName}</h1>
                    <div class="pokemon-id">#${String(pokemonData.id).padStart(5, '0')} ⭐ Special Form</div>
                </div>
                <img class="pokemon-image" src="${pokemonData.sprites.other['official-artwork'].front_default || pokemonData.sprites.front_default}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
                
                <div class="action-buttons">
                    <button class="cry-button" onclick="playCry()">🔊 Play Cry</button>
                    <button class="print-btn" onclick="window.print()">🖨️ Print / PDF</button>
                </div>
                
                <div class="info-grid">
                    <div class="info-card"><div class="info-label">📏 Height</div><div>${pokemonData.height / 10} m</div></div>
                    <div class="info-card"><div class="info-label">⚖️ Weight</div><div>${pokemonData.weight / 10} kg</div></div>
                    <div class="info-card"><div class="info-label">🎮 Base Exp</div><div>${pokemonData.base_experience}</div></div>
                    <div class="info-card"><div class="info-label">🗺️ Region</div><div>${region}</div></div>
                </div>
                
                <div><strong>🌈 Types</strong><ul class="type-badge-list">${pokemonData.types.map(t => `<li class="type-badge" style="background: ${typeColors[t.type.name]}">${t.type.name.toUpperCase()}</li>`).join('')}</ul></div>
                <div><strong>✨ Abilities</strong><ul class="ability-list">${pokemonData.abilities.map(a => `<li class="ability-item">${a.ability.name.replace("-", " ").toUpperCase()}${a.is_hidden ? ' (Hidden)' : ''}</li>`).join('')}</ul></div>
                
                <div><strong>📊 Base Stats</strong><div class="stat-row">❤️ HP: ${stats[0]}<div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(stats[0]/255)*100}%">${stats[0]}</div></div></div>
                <div>⚔️ Attack: ${stats[1]}<div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(stats[1]/255)*100}%">${stats[1]}</div></div></div>
                <div>🛡️ Defense: ${stats[2]}<div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(stats[2]/255)*100}%">${stats[2]}</div></div></div>
                <div>🔮 Sp. Attack: ${stats[3]}<div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(stats[3]/255)*100}%">${stats[3]}</div></div></div>
                <div>✨ Sp. Defense: ${stats[4]}<div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(stats[4]/255)*100}%">${stats[4]}</div></div></div>
                <div>⚡ Speed: ${stats[5]}<div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${(stats[5]/255)*100}%">${stats[5]}</div></div></div>
                <div style="margin-top:10px;"><strong>⭐ Total: ${total}</strong></div></div>
                
                <div class="dex-entry"><strong>📖 Pokédex Entry</strong><br>"${dexText}"</div>
                
                <div class="evolution-section" id="evolutionTree"><div class="evolution-title">🌳 Evolution Tree</div><div class="loader-small"></div></div>
                
                <div style="text-align:center; margin-top:20px;">
                    <a href="pokemon_list.html" class="back-button">← Back to Pokédex</a>
                    <a href="start.html" class="back-button" style="margin-left:15px;">🏠 Home</a>
                </div>
            `;
            
            if (special) {
                await loadEvolutionTree(baseId, displayName);
            } else {
                document.getElementById('evolutionTree').innerHTML = '<p>Evolution data not available for this special form.</p>';
            }
            
        } catch(e) {
            container.innerHTML = `<div style="text-align:center; padding:50px;"><h2>❌ Error loading special form</h2><a href="pokemon_list.html" class="back-button">← Back to Pokédex</a></div>`;
        }
    }
    
    loadPokemonDetail();
</script>
</body>
</html>
