<!DOCTYPE html>
<html>
<head>
    <title>Search Results - Pokémon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 36px;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .search-section {
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 5px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        body.dark-mode .search-section {
            background: rgba(0,0,0,0.8);
        }
        
        .search-box {
            display: flex;
            gap: 0;
        }
        
        .search-box input {
            flex: 1;
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 60px 0 0 60px;
            outline: none;
            background: transparent;
            font-family: inherit;
        }
        
        .search-box button {
            padding: 15px 35px;
            font-size: 16px;
            background: #ffcb05;
            border: none;
            border-radius: 0 60px 60px 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .results-container {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 25px;
            margin: 20px 0;
        }
        
        body.dark-mode .results-container {
            background: rgba(0,0,0,0.8);
            color: white;
        }
        
        .result-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .result-item:hover {
            background: rgba(255,203,5,0.2);
            transform: translateX(10px);
        }
        
        .result-item img {
            width: 60px;
            height: 60px;
        }
        
        .result-info {
            flex: 1;
        }
        
        .result-name {
            font-size: 18px;
            font-weight: bold;
            color: #2a75bb;
        }
        
        body.dark-mode .result-name {
            color: #ffcb05;
        }
        
        .result-id {
            color: #666;
            font-size: 12px;
        }
        
        body.dark-mode .result-id {
            color: #aaa;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .badge-db {
            background: #78c850;
            color: white;
        }
        
        .badge-api {
            background: #2a75bb;
            color: white;
        }
        
        .badge-special {
            background: #ff9800;
            color: white;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
        }
        
        .suggestions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.05);
            border-radius: 15px;
            text-align: center;
        }
        
        body.dark-mode .suggestions {
            background: rgba(255,255,255,0.05);
        }
        
        .suggestions h3 {
            color: #2a75bb;
            margin-bottom: 10px;
        }
        
        body.dark-mode .suggestions h3 {
            color: #ffcb05;
        }
        
        .suggestion-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .suggestion-btn {
            padding: 8px 16px;
            background: #ffcb05;
            color: #2a75bb;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .suggestion-btn:hover {
            transform: scale(1.05);
            background: #f5b700;
        }
        
        .back-link {
            display: inline-block;
            margin: 10px 0;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #ffcb05;
            color: #2a75bb;
        }
        
        .control-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .dark-mode-toggle, .language-select {
            background: #2a75bb;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover, .language-select:hover {
            transform: scale(1.05);
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .result-item {
                flex-wrap: wrap;
                text-align: center;
                justify-content: center;
            }
            .badge {
                margin-top: 5px;
            }
            .control-buttons {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
<div class="control-buttons">
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <select class="language-select" id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>

<div class="container">
    <h1>🔍 Search Results</h1>
    
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Pokémon by name or ID...">
            <button onclick="searchPokemon()">Search</button>
        </div>
    </div>
    
    <div class="results-container" id="resultsContainer">
        <div class="loader"></div>
        <p style="text-align: center;">Loading...</p>
    </div>
    
    <div style="text-align: center;">
        <a href="start.html" class="back-link">← Back to Home</a>
        <a href="pokemon_list.html" class="back-link">📋 All Pokémon</a>
    </div>
</div>

<script>
    let allPokemonData = [];
    let currentLang = localStorage.getItem('language') || 'en';
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        const btn = document.querySelector('.dark-mode-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
        } else {
            btn.innerHTML = '🌙 Dark Mode';
        }
    }
    
    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.getElementById('languageSelect').value = lang;
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-mode-toggle').innerHTML = '☀️ Light Mode';
    }
    document.getElementById('languageSelect').value = currentLang;
    
    // Korrigierte spezielle Formen mit richtigen Namen
    const specialForms = [
        { id: 10034, name: "Mega Charizard X", searchName: "charizard-mega-x", displayName: "Mega Charizard X" },
        { id: 10035, name: "Mega Charizard Y", searchName: "charizard-mega-y", displayName: "Mega Charizard Y" },
        { id: 10036, name: "Mega Mewtwo X", searchName: "mewtwo-mega-x", displayName: "Mega Mewtwo X" },
        { id: 10037, name: "Mega Mewtwo Y", searchName: "mewtwo-mega-y", displayName: "Mega Mewtwo Y" },
        { id: 10038, name: "Mega Gengar", searchName: "gengar-mega", displayName: "Mega Gengar" },
        { id: 10003, name: "Ash-Greninja", searchName: "greninja-ash", displayName: "Ash-Greninja" },
        { id: 10039, name: "Mega Gyarados", searchName: "gyarados-mega", displayName: "Mega Gyarados" },
        { id: 10040, name: "Mega Aerodactyl", searchName: "aerodactyl-mega", displayName: "Mega Aerodactyl" },
        { id: 10041, name: "Mega Ampharos", searchName: "ampharos-mega", displayName: "Mega Ampharos" },
        { id: 10042, name: "Mega Steelix", searchName: "steelix-mega", displayName: "Mega Steelix" },
        { id: 10043, name: "Mega Scizor", searchName: "scizor-mega", displayName: "Mega Scizor" },
        { id: 10044, name: "Mega Heracross", searchName: "heracross-mega", displayName: "Mega Heracross" },
        { id: 10045, name: "Mega Houndoom", searchName: "houndoom-mega", displayName: "Mega Houndoom" },
        { id: 10046, name: "Mega Tyranitar", searchName: "tyranitar-mega", displayName: "Mega Tyranitar" },
        { id: 10047, name: "Mega Blaziken", searchName: "blaziken-mega", displayName: "Mega Blaziken" },
        { id: 10048, name: "Mega Gardevoir", searchName: "gardevoir-mega", displayName: "Mega Gardevoir" },
        { id: 10049, name: "Mega Sableye", searchName: "sableye-mega", displayName: "Mega Sableye" },
        { id: 10050, name: "Mega Mawile", searchName: "mawile-mega", displayName: "Mega Mawile" },
        { id: 10051, name: "Mega Aggron", searchName: "aggron-mega", displayName: "Mega Aggron" }
    ];
    
    async function loadAllPokemon() {
        try {
            const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
            const data = await response.json();
            
            allPokemonData = [];
            
            // Normale Pokémon Gen 1-6
            for (let item of data.results) {
                const id = parseInt(item.url.split('/').slice(-2)[0]);
                if (id <= 721) {
                    let gen = 1;
                    if (id <= 151) gen = 1;
                    else if (id <= 251) gen = 2;
                    else if (id <= 386) gen = 3;
                    else if (id <= 493) gen = 4;
                    else if (id <= 649) gen = 5;
                    else gen = 6;
                    
                    allPokemonData.push({
                        id: id,
                        name: item.name.charAt(0).toUpperCase() + item.name.slice(1),
                        searchName: item.name,
                        isSpecial: false,
                        gen: gen
                    });
                }
            }
            
            // Spezielle Formen
            for (let special of specialForms) {
                allPokemonData.push({
                    id: special.id,
                    name: special.displayName,
                    searchName: special.searchName,
                    isSpecial: true
                });
            }
            
            // URL-Parameter auslesen und suchen
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            if (query) {
                document.getElementById('searchInput').value = query;
                performSearch(query);
            } else {
                document.getElementById('resultsContainer').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <p>Enter a Pokémon name or ID to search!</p>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error loading Pokémon:', error);
            document.getElementById('resultsContainer').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <p>❌ Error loading Pokémon data. Please refresh the page.</p>
                </div>
            `;
        }
    }
    
    function performSearch(query) {
        const container = document.getElementById('resultsContainer');
        const lowerQuery = query.toLowerCase();
        
        const results = allPokemonData.filter(p => 
            p.name.toLowerCase().includes(lowerQuery) || 
            (p.searchName && p.searchName.toLowerCase().includes(lowerQuery))
        );
        
        if (results.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <p>❌ No Pokémon found for "${query}"</p>
                    <div class="suggestions">
                        <h3>💡 Suggestions</h3>
                        <p>Try searching for:</p>
                        <div class="suggestion-buttons">
                            <a href="search_results.html?q=pikachu" class="suggestion-btn">Pikachu</a>
                            <a href="search_results.html?q=charizard" class="suggestion-btn">Charizard</a>
                            <a href="search_results.html?q=mewtwo" class="suggestion-btn">Mewtwo</a>
                            <a href="search_results.html?q=greninja" class="suggestion-btn">Greninja</a>
                            <a href="search_results.html?q=mega" class="suggestion-btn">Mega</a>
                            <a href="search_results.html?q=ash" class="suggestion-btn">Ash</a>
                        </div>
                    </div>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <h2 style="margin-bottom: 20px;">Results for "${query}" (${results.length})</h2>
            ${results.map(p => `
                <div class="result-item" onclick="location.href='pokemon_detail.html?id=${p.id}'">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" 
                         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'">
                    <div class="result-info">
                        <div class="result-name">${p.name}</div>
                        <div class="result-id">#${String(p.id).padStart(p.isSpecial ? 5 : 3, '0')}</div>
                    </div>
                    <span class="badge ${p.isSpecial ? 'badge-special' : 'badge-db'}">
                        ${p.isSpecial ? '⭐ Special Form' : `Gen ${p.gen}`}
                    </span>
                </div>
            `).join('')}
        `;
    }
    
    function searchPokemon() {
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            window.location.href = `search_results.html?q=${encodeURIComponent(query)}`;
        }
    }
    
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchPokemon();
        }
    });
    
    loadAllPokemon();
</script>
</body>
</html>
