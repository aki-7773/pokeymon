<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pokémon Website</title>
    <meta http-equiv="refresh" content="0; url=/pokeymon/views/start.html">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #ffcb05;
        }
    </style>
</head>
<body>
    <h1>🔄 Pokémon Website</h1>
    <div class="loader"></div>
    <p>Redirecting to Pokémon Database...</p>
    <p>If not redirected, <a href="/pokeymon/views/start.html">click here</a></p>
    
    <script>
        // Automatische Weiterleitung
        setTimeout(function() {
            window.location.href = "/pokeymon/views/start.html";
        }, 1000);
    </script>
</body>
</html>
