<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pokémon Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcb05;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        a {
            color: #ffcb05;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #ffcb05;
            color: #2a75bb;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🔄 Pokémon Website</h1>
    <div class="loader"></div>
    <div class="error-box">
        <p>Redirecting...</p>
        <p>If not redirected, try one of these links:</p>
        <button onclick="location.href='Codes/views/start.html'">📁 /Codes/views/start.html</button>
        <button onclick="location.href='views/start.html'">📁 /views/start.html</button>
        <button onclick="location.href='pokeymon/views/start.html'">📁 /pokeymon/views/start.html</button>
    </div>
    
    <script>
        // Versuche verschiedene Pfade
        const paths = [
            'Codes/views/start.html',
            'views/start.html',
            'pokeymon/views/start.html',
            'pokeymon/Codes/views/start.html'
        ];
        
        let currentIndex = 0;
        
        function tryNextPath() {
            if (currentIndex < paths.length) {
                console.log('Trying:', paths[currentIndex]);
                fetch(paths[currentIndex])
                    .then(response => {
                        if (response.ok) {
                            window.location.href = paths[currentIndex];
                        } else {
                            currentIndex++;
                            tryNextPath();
                        }
                    })
                    .catch(() => {
                        currentIndex++;
                        tryNextPath();
                    });
            }
        }
        
        tryNextPath();
    </script>
</body>
</html>
